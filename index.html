<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finances</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#2563EB;--blue-light:#EFF6FF;--blue-mid:#DBEAFE;
  --green:#059669;--green-light:#ECFDF5;--green-mid:#D1FAE5;
  --red:#DC2626;--red-light:#FEF2F2;--red-mid:#FECACA;
  --amber:#D97706;--amber-light:#FFFBEB;--amber-mid:#FDE68A;
  --purple:#7C3AED;--purple-light:#F5F3FF;--purple-mid:#EDE9FE;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;
  --gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;
  --gray-600:#475569;--gray-700:#334155;--gray-900:#0F172A;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 8px 32px rgba(15,23,42,.12),0 4px 12px rgba(15,23,42,.06);
}
/* Map legacy CSS vars to our new system so old JS still works */
:root{
  --color-background-primary:#fff;
  --color-background-secondary:var(--gray-50);
  --color-background-tertiary:var(--gray-100);
  --color-border-tertiary:var(--gray-200);
  --color-border-secondary:var(--gray-300);
  --color-text-primary:var(--gray-900);
  --color-text-secondary:var(--gray-600);
  --color-text-tertiary:var(--gray-400);
  --border-radius-md:var(--radius-md);
  --border-radius-lg:var(--radius-lg);
  --font-sans:'DM Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
}
html.dark,:root:not(.light){--_dk:1}
html.dark,@media(prefers-color-scheme:dark){html:not(.light){--_dk:1}}

/* ─── DARK TOKENS ─── */
html.dark{
  --blue:#60A5FA;--blue-light:#1E3A5F;--blue-mid:#1E3A8A;
  --green:#34D399;--green-light:#064E3B;--green-mid:#065F46;
  --red:#F87171;--red-light:#450A0A;--red-mid:#7F1D1D;
  --amber:#FCD34D;--amber-light:#451A03;--amber-mid:#78350F;
  --purple:#A78BFA;--purple-light:#2E1065;--purple-mid:#3B0764;
  --gray-50:#111827;--gray-100:#1a2235;--gray-200:#233047;
  --gray-300:#2e3d55;--gray-400:#607090;--gray-500:#8a9db5;
  --gray-600:#C8D8E8;--gray-700:#E2EBF5;--gray-900:#F0F6FF;
  --color-background-primary:#0d1424;
  --color-background-secondary:#111827;
  --color-background-tertiary:#1a2235;
  --color-border-tertiary:#233047;
  --color-border-secondary:#2e3d55;
  --color-text-primary:#F0F6FF;
  --color-text-secondary:#C8D8E8;
  --color-text-tertiary:#607090;
}
@media(prefers-color-scheme:dark){html:not(.light){
  --blue:#60A5FA;--blue-light:#1E3A5F;--blue-mid:#1E3A8A;
  --green:#34D399;--green-light:#064E3B;--green-mid:#065F46;
  --red:#F87171;--red-light:#450A0A;--red-mid:#7F1D1D;
  --amber:#FCD34D;--amber-light:#451A03;--amber-mid:#78350F;
  --purple:#A78BFA;--purple-light:#2E1065;--purple-mid:#3B0764;
  --gray-50:#111827;--gray-100:#1a2235;--gray-200:#233047;
  --gray-300:#2e3d55;--gray-400:#607090;--gray-500:#8a9db5;
  --gray-600:#C8D8E8;--gray-700:#E2EBF5;--gray-900:#F0F6FF;
  --color-background-primary:#0d1424;
  --color-background-secondary:#111827;
  --color-background-tertiary:#1a2235;
  --color-border-tertiary:#233047;
  --color-border-secondary:#2e3d55;
  --color-text-primary:#F0F6FF;
  --color-text-secondary:#C8D8E8;
  --color-text-tertiary:#607090;
}}


/* ═══════════════════════════════════════════════
   DARK MODE — redesign completo
   ═══════════════════════════════════════════════ */

/* Body background */
html.dark body { background: #0a0f1a; }
@media(prefers-color-scheme:dark){ html:not(.light) body { background: #0a0f1a; } }

/* ── Topbar e Tabs: escuros ── */
html.dark .topbar {
  background: #0d1424;
  border-bottom-color: #1e2d45;
  box-shadow: 0 1px 0 #1e2d45, 0 2px 12px rgba(0,0,0,.4);
}
html.dark .topbar h1 { color: #e8f0fe; }
html.dark .topbar select {
  background: #162035;
  color: #a8bdd8;
  border-color: #1e2d45;
}
html.dark .tabs {
  background: #0d1424;
  border-bottom-color: #1e2d45;
}
html.dark .tab { color: #4a6285; }
html.dark .tab:hover { color: #8aafd4; }
html.dark .tab.on { color: #60a5fa; border-bottom-color: #60a5fa; }

/* dark btn toggle */
html.dark .resultado-lbl { color: #fff !important; }
html.dark .resultado-val { color: #fff !important; }
@media(prefers-color-scheme:dark){ html:not(.light) .resultado-lbl { color: #fff !important; } html:not(.light) .resultado-val { color: #fff !important; } }
html.dark #dk-btn { border-color: #1e2d45; color: #a8bdd8; }
html.dark #dk-btn:hover { background: #162035; border-color: #2e4060; }

/* ── Cards, Stats, etc ── */
html.dark .card,
html.dark .stat,
html.dark .acc-c,
html.dark .fixa-card,
html.dark .cat-card,
html.dark .proj-body,
html.dark .nav-btn,
html.dark .btn-g {
  background: #0f1e35;
  border-color: #1e2d45;
}

html.dark .card { box-shadow: 0 2px 12px rgba(0,0,0,.3); }
html.dark .stat:hover { box-shadow: 0 4px 20px rgba(0,0,0,.4); }

/* ── Textos gerais ── */
html.dark .ph h3 { color: #c8daf0; }
html.dark .stat .lbl { color: #4a6285; }
html.dark .fixa-name, html.dark .tx-desc { color: #d4e4f7; }
html.dark .fixa-sub, html.dark .tx-cat-name { color: #5a7a9e; }
html.dark .tx-acc-name, html.dark .tx-dot-sep { color: #3a5575; }
html.dark .id { color: #c8daf0; }
html.dark .im2 { color: #4a6285; }
html.dark .iv { color: #c8daf0; }

/* ── Item rows ── */
html.dark .item:hover { background: #162035; }
html.dark .tx-card:hover { background: #162035; }
html.dark .tx-day-label { color: #3a5575; }

/* ── TX Group ── */
html.dark .tx-group-header { background: #0a0f1a; border-color: #1e2d45; }
html.dark .tx-group-title { color: #7a9fcc; }
html.dark .tx-group-totals { color: #7a9fcc; }

/* ── Section label ── */
html.dark .sl { color: #3a5575; border-color: #1e2d45; }

/* ── Projection ── */
html.dark .proj-header { background: #0a0f1a; }
html.dark .proj-header:hover { background: #162035; }
html.dark .proj-header .ph-name { color: #c8daf0; }
html.dark .proj-row { border-color: #1e2d45; }
html.dark .proj-row .pr-name { color: #8aafd4; }
html.dark .proj-body { background: #0f1e35; }

/* ── Projeção — Detalhamento por mês (dark) ── */
html.dark .proj-month-mes-badge { background: #0c2a4a !important; color: #7ec8f7 !important; font-weight: 700 !important; }
html.dark .proj-header-month-name { color: #c8daf0 !important; font-weight: 700 !important; }
html.dark .proj-header-rec  { color: #34d399 !important; font-weight: 700 !important; }
html.dark .proj-header-exp  { color: #f87171 !important; font-weight: 700 !important; }
html.dark .proj-header-saldo-pos { color: #34d399 !important; font-weight: 700 !important; }
html.dark .proj-header-saldo-neg { color: #f87171 !important; font-weight: 700 !important; }
html.dark .proj-section-label { color: #607090 !important; font-weight: 700 !important; }
html.dark .proj-section-label-plan { color: #a78bfa !important; font-weight: 700 !important; }

/* ── Period & Fam chips ── */
html.dark .period-btn { background: #162035; color: #4a6285; border-color: #1e2d45; }
html.dark .period-btn:hover { color: #8aafd4; border-color: #2e4060; }
html.dark .period-btn.on { background: #1d4ed8; color: #e0eeff; border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,.4); }
html.dark .fam-chip { background: #162035; color: #4a6285; border-color: #1e2d45; }
html.dark .fam-chip:hover { border-color: #2e4060; color: #8aafd4; }
html.dark .fam-chip.sel { background: #1e1050; color: #a78bfa; border-color: #5b21b6; }
html.dark .fam-badge { background: #1e1050; color: #a78bfa; }
html.dark .fam-edit-box { background: #1a1040; border-color: #3b1f80; }
html.dark .fam-edit-chip { background: #2e1070; color: #c4b5fd; }
html.dark .fam-edit-chip button { color: #a78bfa; }
html.dark .fam-edit-input { background: #162035; color: #c8daf0; border-color: #5b21b6; }

/* ── Forms ── */
html.dark .fr label { color: #3a5575; }
html.dark .fr input, html.dark .fr select, html.dark .fr textarea {
  background: #162035;
  color: #c8daf0;
  border-color: #1e2d45;
}
html.dark .fr input:focus, html.dark .fr select:focus, html.dark .fr textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,.15);
}

/* ── Type toggle ── */
html.dark .tb { background: #162035; color: #4a6285; border-color: #1e2d45; }
html.dark .tb.rec { background: #042f1e; color: #6ee7b7; border-color: #065f46; }
html.dark .tb.exp { background: #2d0a0a; color: #fca5a5; border-color: #7f1d1d; }
html.dark .tb.tr-type { background: #1e1050; color: #c4b5fd; border-color: #3b0764; }

/* ── Buttons ── */
html.dark .btn-r { background: #1d4ed8; color: #e0eeff; }
html.dark .btn-r:hover { background: #2563eb; box-shadow: 0 4px 16px rgba(37,99,235,.4); }
html.dark .btn-p { background: #5b21b6; color: #ede9fe; }
html.dark .btn-p:hover { background: #7c3aed; }
html.dark .btn-grn { background: #065f46; color: #d1fae5; }
html.dark .btn-grn:hover { background: #059669; }
html.dark .btn-g { background: #162035; border-color: #1e2d45; color: #7a9fcc; }
html.dark .btn-g:hover { background: #1e2d45; border-color: #2e4060; }
html.dark .btn-d { background: #2d0a0a; border-color: #7f1d1d; color: #fca5a5; }
html.dark .btn-d:hover { background: #450a0a; border-color: #ef4444; }
html.dark .btn-e { background: #0c1f40; border-color: #1e3a8a; color: #93c5fd; }
html.dark .btn-e:hover { background: #1e3a8a; border-color: #3b82f6; }
html.dark .copy-btn { background: #0c1f40; color: #93c5fd; border: 1px solid #1e3a8a; }
html.dark .copy-btn:hover { background: #1e3a8a; }
html.dark .nav-btn { background: #162035; border-color: #1e2d45; color: #7a9fcc; }
html.dark .nav-btn:hover { background: #1e2d45; border-color: #2e4060; }

/* ── Badges ── */
html.dark .b-pend { background: #291500; color: #fcd34d; }
html.dark .b-venc { background: #2d0a0a; color: #fca5a5; }
html.dark .b-rep  { background: #1e1050; color: #c4b5fd; }
html.dark .b-ok   { background: #042f1e; color: #6ee7b7; }
html.dark .b-tr   { background: #1e1050; color: #c4b5fd; }
html.dark .b-inativo { background: #162035; color: #3a5575; }

/* ── TX chips ── */
html.dark .tx-fam   { background: #1e1050; color: #c4b5fd; }
html.dark .tx-recur { background: #0c1f40; color: #93c5fd; }
html.dark .tx-recur-tip { background: #0a0f1a; color: #c8daf0; border: 1px solid #1e2d45; }
html.dark .tx-recur-tip::after { border-top-color: #0a0f1a; }

/* ── Transfer box ── */
html.dark .trbox { background: #1e1050; border-color: #4c1d95; }
html.dark .trs .tn { color: #ede9fe; }
html.dark .trs .tl, html.dark .trm .tv { color: #a78bfa; }
html.dark .trm .ti { color: #a78bfa; }

/* ── Misc ── */
html.dark .bar-bg { background: #162035; }
html.dark .progress-bar { background: #162035; }
html.dark .confirm { background: #2d0a0a; border-color: #7f1d1d; }
html.dark .confirm-dialog { background: #0f1e35; box-shadow: 0 24px 60px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.35); }
html.dark .toast { background: #1e2d45; color: #e0eeff; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
html.dark .swatch.sel { border-color: #60a5fa; box-shadow: 0 0 0 2px #0d1424, 0 0 0 4px #1e3a8a; }
html.dark .empty { color: #3a5575; }
html.dark #fam-chart-card { background: #0f1e35; border-color: #1e2d45; }
html.dark #fam-chart-card .ph { border-color: #1e2d45; }
html.dark #db-bar { background: #0d1424!important; border-color: #1e2d45!important; color: #4a6285!important; }
html.dark #db-bar button { filter: brightness(.85) saturate(.8); }

/* ── Aba Cadastros — dark mode ── */
html.dark .cat-name { color: #c8daf0; }
html.dark .cat-card { background: #0f1e35; border-color: #1e2d45; }
html.dark .cat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.35); }
html.dark .fam-member-chip { background: #1e1050 !important; border-color: #3b1f80 !important; }
html.dark .fam-member-chip span { color: #c4b5fd !important; }
html.dark .fam-member-chip button { color: #a78bfa !important; }
html.dark .fam-member-input { background: #162035 !important; color: #c8daf0 !important; border-color: #2e3d55 !important; }
html.dark .fam-member-input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,.15) !important; }
html.dark .bar-row-label { color: #8aafd4 !important; }
html.dark .bar-row-pct { color: #607090 !important; }
html.dark .bar-row-val { color: #8aafd4 !important; }

/* ─── DARK TOGGLE BUTTON ─── */
#dk-btn{background:none;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;transition:background .2s,border-color .2s,transform .15s;flex-shrink:0}
#dk-btn:hover{background:var(--gray-50);border-color:var(--gray-300);transform:scale(1.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:16px;background:var(--gray-100);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ─── APP SHELL ─── */
.app{background:var(--gray-100);min-height:600px;max-width:100%}

/* ─── TOPBAR ─── */
.topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 var(--gray-200),0 2px 8px rgba(15,23,42,.04)}
.topbar h1{font-size:17px;font-weight:700;color:var(--gray-900);flex:1;letter-spacing:-.4px}
.topbar select{font-size:14px;padding:7px 12px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-700);font-family:var(--font-sans);cursor:pointer;outline:none;transition:border-color .15s}
.topbar select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}

/* ─── TABS ─── */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;gap:0;padding:0 12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:13px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;border-bottom:2.5px solid transparent;color:var(--gray-400);background:none;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s,border-color .15s;border-radius:0;font-family:var(--font-sans);letter-spacing:.01em}
.tab:hover{color:var(--gray-700)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab i{font-size:15px}
.tab-cfg{margin-left:auto;padding:13px 16px;font-size:16px}
.tab-cfg.on{color:var(--purple)!important;border-bottom-color:var(--purple)!important}
html.dark .tab-cfg.on{color:var(--purple)!important;border-bottom-color:var(--purple)!important}
.cfg-menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;background:none;border:none;border-radius:var(--radius-md);cursor:pointer;text-align:left;font-family:var(--font-sans);color:var(--gray-900);transition:background .12s}
.cfg-menu-item:hover{background:var(--gray-100)}
html.dark #cfg-menu{background:#0f1e35;border-color:#1e2d45;box-shadow:0 8px 32px rgba(0,0,0,.5)}
html.dark #cfg-menu>div:first-child{border-bottom-color:#1e2d45}
html.dark .cfg-menu-item{color:var(--gray-900)}
html.dark .cfg-menu-item:hover{background:var(--gray-100)}
@media(prefers-color-scheme:dark){html:not(.light) #cfg-menu{background:#0f1e35;border-color:#1e2d45}html:not(.light) #cfg-menu>div:first-child{border-bottom-color:#1e2d45}}
.trans-subnav{display:flex;gap:0;background:var(--gray-50);border-bottom:1.5px solid var(--gray-200);padding:0 12px;overflow-x:auto;scrollbar-width:none}
.trans-subnav::-webkit-scrollbar{display:none}
.trans-sub-btn{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;border-bottom:2.5px solid transparent;color:var(--gray-500);background:none;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s,border-color .15s;font-family:var(--font-sans);letter-spacing:.01em;margin-bottom:-1.5px}
.trans-sub-btn:hover{color:var(--gray-700)}
.trans-sub-btn.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
html.dark .trans-subnav{background:var(--gray-100);border-bottom-color:var(--gray-200)}
html.dark .trans-sub-btn{color:var(--gray-400)}
html.dark .trans-sub-btn:hover{color:var(--gray-600)}
html.dark .trans-sub-btn.on{color:#60a5fa;border-bottom-color:#60a5fa}
@media(prefers-color-scheme:dark){html:not(.light) .trans-subnav{background:var(--gray-100);border-bottom-color:var(--gray-200)}html:not(.light) .trans-sub-btn{color:var(--gray-400)}html:not(.light) .trans-sub-btn.on{color:#60a5fa;border-bottom-color:#60a5fa}}

/* ─── CONTENT ─── */
.cnt{padding:16px;display:flex;flex-direction:column;gap:14px}

/* ─── CARDS ─── */
.card{background:#fff;border-radius:var(--radius-xl);border:1px solid var(--gray-200);padding:18px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}

/* ─── CARD HEADER ─── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ph h3{font-size:15px;font-weight:700;color:var(--gray-800);display:flex;align-items:center;gap:7px;letter-spacing:-.2px}
.ph h3 i{color:var(--gray-400);font-size:16px}

/* ─── STAT TILES ─── */
.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.stat{background:#fff;border-radius:var(--radius-xl);border:1px solid var(--gray-200);padding:16px 18px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat .lbl{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat .val{font-size:22px;font-weight:700;letter-spacing:-.6px;line-height:1;font-family:var(--font-mono)}

/* ─── TRANSACTION ROWS ─── */
.item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:var(--radius-md);border-bottom:1px solid var(--gray-100);transition:background .12s}
.item:last-child{border-bottom:none}
.item:hover{background:var(--gray-50)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.im{flex:1;min-width:0}
.id{font-size:15px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.im2{font-size:12px;color:var(--gray-400);margin-top:2px}
.iv{font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-.3px;font-family:var(--font-mono)}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.1px}
.b-pend{background:var(--amber-light);color:#92400E}
.b-venc{background:var(--red-light);color:#991B1B}
.b-rep{background:var(--purple-light);color:#5B21B6}
.b-ok{background:var(--green-light);color:#065F46}
.b-tr{background:var(--purple-light);color:#5B21B6}
.b-inativo{background:var(--gray-100);color:var(--gray-500)}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:40px 16px;color:var(--gray-400);font-size:15px;font-weight:500}

/* ─── SECTION LABEL ─── */
.sl{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;padding:6px 8px 4px;border-bottom:1px solid var(--gray-100);margin-bottom:2px;display:flex;justify-content:space-between}

/* ─── FORM GRID ─── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr{display:flex;flex-direction:column;gap:5px}
.fr.full{grid-column:1/-1}
.fr label{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.7px}
.fr input,.fr select,.fr textarea{font-size:15px;padding:10px 13px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-900);width:100%;font-family:var(--font-sans);transition:border-color .15s,box-shadow .15s;outline:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fr textarea{resize:vertical;min-height:48px}

/* ─── TYPE TOGGLE ─── */
.tbtns{display:flex;gap:8px;margin-bottom:16px}
.tb{flex:1;padding:10px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);font-size:15px;font-weight:600;cursor:pointer;background:var(--gray-50);color:var(--gray-500);font-family:var(--font-sans);transition:all .15s}
.tb.rec{background:var(--green-light);color:#065F46;border-color:#34D399}
.tb.exp{background:var(--red-light);color:#991B1B;border-color:#F87171}
.tb.tr-type{background:var(--purple-light);color:#5B21B6;border-color:#A78BFA}

/* ─── BUTTONS ─── */
.btn-r{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-md);padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-sans);transition:all .18s;letter-spacing:.1px}
.btn-r:hover{background:#1D4ED8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.35)}
.btn-p{background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-sans);transition:all .18s}
.btn-p:hover{background:#6D28D9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,.35)}
.btn-grn{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-sans);transition:all .18s}
.btn-grn:hover{background:#047857;transform:translateY(-1px);box-shadow:0 4px 14px rgba(5,150,105,.3)}
.btn-g{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-md);padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-600);font-family:var(--font-sans);transition:all .15s}
.btn-g:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-d{background:var(--red-light);border:1.5px solid var(--red-mid);color:var(--red);cursor:pointer;padding:6px 11px;font-size:14px;font-weight:700;border-radius:var(--radius-md);transition:all .12s;line-height:1}
.btn-d:hover{background:#FECACA;border-color:#F87171}
.btn-e{background:var(--blue-light);border:1.5px solid var(--blue-mid);color:var(--blue);cursor:pointer;padding:6px 11px;font-size:14px;font-weight:600;border-radius:var(--radius-md);transition:all .12s;line-height:1}
.btn-e:hover{background:#DBEAFE;border-color:#93C5FD}

/* ─── CATEGORIA ÁRVORE ─── */
.cat-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:14px}
.cat-tab-btn{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-2px;color:var(--gray-400);font-family:var(--font-sans);transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px}
.cat-tab-btn:hover{color:var(--gray-700)}
.cat-tab-btn.on{color:var(--blue);border-bottom-color:var(--blue)}
.cat-tab-btn.desp.on{color:#DC2626;border-bottom-color:#DC2626}
.cat-tab-btn.rec.on{color:#059669;border-bottom-color:#059669}
.cat-tab-btn.tr.on{color:#7C3AED;border-bottom-color:#7C3AED}
.cat-tab-btn.fam.on{color:#7C3AED;border-bottom-color:#7C3AED}
.cat-tree{display:flex;gap:12px;align-items:flex-start}
.cat-tree-list{flex:1;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden;background:#fff;min-height:280px}
.cat-tree-item{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--gray-100);cursor:pointer;user-select:none;transition:background .1s}
.cat-tree-item:last-child{border-bottom:none}
.cat-tree-item:hover{background:var(--gray-50)}
.cat-tree-item.selected{background:var(--blue-mid)!important}
.cat-tree-item.selected .cti-name{color:var(--blue);font-weight:700}
.cat-tree-item.desp.selected{background:#FEE2E2!important}
.cat-tree-item.desp.selected .cti-name{color:#DC2626}
.cat-tree-item.rec.selected{background:#D1FAE5!important}
.cat-tree-item.rec.selected .cti-name{color:#059669}
.cat-tree-item.tr.selected{background:var(--purple-mid)!important}
.cat-tree-item.tr.selected .cti-name{color:#7C3AED}
.cti-toggle{width:28px;height:38px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gray-400);flex-shrink:0}
.cti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:8px}
.cti-name{font-size:14px;color:var(--gray-800);flex:1;padding:10px 4px 10px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cti-root .cti-name{font-weight:700;font-size:14px}
.cti-sub{padding-left:28px}
.cti-sub .cti-name{font-size:13px;font-weight:400;color:var(--gray-600)}
.cat-tree-actions{display:flex;flex-direction:column;gap:7px;flex-shrink:0;width:130px}
.cat-act-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-700);font-family:var(--font-sans);transition:all .15s;white-space:nowrap}
.cat-act-btn:hover{background:var(--gray-50);border-color:var(--gray-300)}
.cat-act-btn.add{border-color:#BFDBFE;background:#EFF6FF;color:#1D4ED8}
.cat-act-btn.add:hover{background:#DBEAFE}
.cat-act-btn.addsub{border-color:#DDD6FE;background:#F5F3FF;color:#5B21B6}
.cat-act-btn.addsub:hover{background:#EDE9FE}
.cat-act-btn.edit{border-color:#D1FAE5;background:#ECFDF5;color:#065F46}
.cat-act-btn.edit:hover{background:#D1FAE5}
.cat-act-btn.del{border-color:#FECACA;background:#FEF2F2;color:#DC2626}
.cat-act-btn.del:hover{background:#FEE2E2}
.cat-act-btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
/* dark */
html.dark .cat-tabs{border-bottom-color:#1e2d45}
html.dark .cat-tab-btn{color:#4a6285}
html.dark .cat-tab-btn:hover{color:#8aafd4}
html.dark .cat-tab-btn.on{color:#60a5fa;border-bottom-color:#60a5fa}
html.dark .cat-tab-btn.desp.on{color:#f87171;border-bottom-color:#f87171}
html.dark .cat-tab-btn.rec.on{color:#34d399;border-bottom-color:#34d399}
html.dark .cat-tab-btn.tr.on{color:#a78bfa;border-bottom-color:#a78bfa}
html.dark .cat-tree-list{background:#0f1e35;border-color:#1e2d45}
html.dark .cat-tree-item{border-bottom-color:#1e2d45}
html.dark .cat-tree-item:hover{background:#162035}
html.dark .cat-tree-item.selected{background:#1e3a8a!important}
html.dark .cat-tree-item.selected .cti-name{color:#93c5fd}
html.dark .cat-tree-item.desp.selected{background:#450a0a!important}
html.dark .cat-tree-item.desp.selected .cti-name{color:#f87171}
html.dark .cat-tree-item.rec.selected{background:#064e3b!important}
html.dark .cat-tree-item.rec.selected .cti-name{color:#34d399}
html.dark .cat-tree-item.tr.selected{background:#2e1065!important}
html.dark .cat-tree-item.tr.selected .cti-name{color:#a78bfa}
html.dark .cti-name{color:#c8daf0}
html.dark .cti-sub .cti-name{color:#8aafd4}
html.dark .cti-toggle{color:#607090}
html.dark .cat-act-btn{background:#0f1e35;border-color:#1e2d45;color:#7a9fcc}
html.dark .cat-act-btn:hover{background:#162035;border-color:#2e4060}
html.dark .cat-act-btn.add{background:#0c1f40;border-color:#1e3a8a;color:#93c5fd}
html.dark .cat-act-btn.add:hover{background:#1e3a8a}
html.dark .cat-act-btn.addsub{background:#1e1050;border-color:#3b1f80;color:#c4b5fd}
html.dark .cat-act-btn.addsub:hover{background:#2e1070}
html.dark .cat-act-btn.edit{background:#042f1e;border-color:#065f46;color:#6ee7b7}
html.dark .cat-act-btn.edit:hover{background:#065f46}
html.dark .cat-act-btn.del{background:#2d0a0a;border-color:#7f1d1d;color:#fca5a5}
html.dark .cat-act-btn.del:hover{background:#450a0a}

/* ─── AGRUPAMENTO DE LANÇAMENTOS ─── */
.grp-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 0 2px;border-top:1px solid var(--gray-200);margin-top:6px}
.grp-bar-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-right:2px}
.grp-btn{padding:4px 12px;font-size:12px;font-weight:600;border-radius:99px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.grp-btn:hover{background:var(--gray-100)}
.grp-btn.on{background:#0F172A;color:#fff;border-color:#0F172A}

/* tabela de agrupamento */
.grp-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px}
.grp-table thead th{text-align:left;font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;padding:6px 10px;border-bottom:1.5px solid var(--gray-200)}
.grp-table thead th:last-child,.grp-table thead th:nth-last-child(2){text-align:right}
.grp-type-row td{font-weight:800;font-size:13px;padding:10px 10px 8px;letter-spacing:.01em;border-bottom:1px solid rgba(0,0,0,.06)}
.grp-type-row.receita td{background:#059669;color:#fff}
.grp-type-row.despesa td{background:#DC2626;color:#fff}
.grp-type-row.transferencia td{background:#7C3AED;color:#fff}
.grp-type-row td .grp-type-total{text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}
.grp-cat-row{cursor:pointer;transition:background .1s}
.grp-cat-row:hover{background:var(--gray-50)}
.grp-cat-row td{padding:9px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);font-size:13px}
.grp-cat-row .grp-pct{color:var(--gray-400);font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
.grp-cat-row .grp-soma{font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.grp-total-row td{padding:10px 10px;font-weight:700;font-size:13px;border-top:2px solid var(--gray-200);background:var(--gray-50)}
.grp-total-row .grp-soma{text-align:right;color:#059669}
.grp-toggle{font-size:11px;color:var(--gray-400);margin-right:4px;display:inline-block;width:14px}
.grp-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;flex-shrink:0;vertical-align:middle}
/* sub-linhas de lançamentos dentro da categoria */
.grp-tx-row{transition:background .1s}
.grp-tx-row:hover{background:var(--blue-light)}
.grp-tx-row td{padding:7px 10px 7px 32px;border-bottom:1px solid var(--gray-100);font-size:12px;color:var(--gray-600)}
.grp-tx-row .grp-soma{font-size:12px;font-weight:500}
/* dark */
html.dark .grp-bar{border-top-color:#1e2d45}
html.dark .grp-btn{background:#0f1e35;border-color:#1e2d45;color:#4a6285}
html.dark .grp-btn:hover{background:#162035}
html.dark .grp-btn.on{background:#c8daf0;color:#0f1e35;border-color:#c8daf0}
html.dark .grp-table thead th{color:#607090;border-bottom-color:#1e2d45}
html.dark .grp-cat-row:hover{background:#162035}
html.dark .grp-cat-row td{color:#c8daf0;border-bottom-color:#1e2d45}
html.dark .grp-cat-row .grp-pct{color:#607090}
html.dark .grp-tx-row td{border-bottom-color:#1e2d45;color:#8aafd4}
html.dark .grp-tx-row:hover{background:#1e3a8a}
.grp-sub-row td{padding:7px 10px;border-bottom:1px solid var(--gray-100);font-size:12px;color:var(--gray-600);background:var(--gray-50)}
.grp-sub-row:hover{background:#eef4ff}
html.dark .grp-sub-row td{border-bottom-color:#1e2d45;color:#8aafd4;background:#080e1c}
html.dark .grp-sub-row:hover{background:#1e3a8a}
html.dark .grp-total-row .grp-soma{color:#34d399}

/* ─── PAINEL DATE INPUTS ─── */
.painel-date-input{font-size:13px;padding:6px 9px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
html.dark .painel-date-input{background:#162035!important;color:#c8daf0!important;border-color:#1e2d45!important}
@media(prefers-color-scheme:dark){html:not(.light) .painel-date-input{background:#162035!important;color:#c8daf0!important;border-color:#1e2d45!important}}

/* ─── CAT TREE PICKER ─── */
.ctp-wrap{position:relative;width:100%}
.ctp-trigger{display:flex;align-items:center;gap:8px;width:100%;font-size:15px;padding:10px 13px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-900);font-family:var(--font-sans);cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:left;outline:none;min-height:44px}
.ctp-trigger:focus,.ctp-trigger.open{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ctp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ctp-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctp-arrow{font-size:11px;color:var(--gray-400);flex-shrink:0;transition:transform .15s}
.ctp-trigger.open .ctp-arrow{transform:rotate(180deg)}
.ctp-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:1000;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(15,23,42,.12),0 2px 8px rgba(15,23,42,.06);max-height:260px;overflow-y:auto;display:none;scrollbar-width:thin}
.ctp-dropdown.open{display:block}
.ctp-item{display:flex;align-items:center;border-bottom:1px solid var(--gray-100);cursor:pointer;user-select:none;transition:background .1s}
.ctp-item:last-child{border-bottom:none}
.ctp-item:hover{background:var(--gray-50)}
.ctp-item.selected{background:var(--blue-mid)}
.ctp-item.selected .ctp-iname{color:var(--blue);font-weight:700}
.ctp-item.desp.selected{background:#FEE2E2}.ctp-item.desp.selected .ctp-iname{color:#DC2626}
.ctp-item.rec.selected{background:#D1FAE5}.ctp-item.rec.selected .ctp-iname{color:#059669}
.ctp-item.tr.selected{background:var(--purple-mid)}.ctp-item.tr.selected .ctp-iname{color:#7C3AED}
.ctp-toggle{width:28px;height:38px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gray-400);flex-shrink:0}
.ctp-idot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:8px}
.ctp-iname{font-size:14px;color:var(--gray-800);flex:1;padding:10px 4px 10px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctp-root .ctp-iname{font-weight:700}
.ctp-sub{padding-left:28px}.ctp-sub .ctp-iname{font-size:13px;font-weight:400;color:var(--gray-600)}
.ctp-children{display:none}.ctp-children.open{display:block}
html.dark .ctp-trigger{background:#162035;color:#c8daf0;border-color:#1e2d45}
html.dark .ctp-trigger:focus,html.dark .ctp-trigger.open{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
html.dark .ctp-dropdown{background:#0f1e35;border-color:#1e2d45;box-shadow:0 8px 24px rgba(0,0,0,.4)}
html.dark .ctp-item{border-bottom-color:#1e2d45}
html.dark .ctp-item:hover{background:#162035}
html.dark .ctp-item.selected{background:#1e3a8a}.html.dark .ctp-item.selected .ctp-iname{color:#93c5fd}
html.dark .ctp-item.desp.selected{background:#450a0a}.html.dark .ctp-item.desp.selected .ctp-iname{color:#f87171}
html.dark .ctp-item.rec.selected{background:#064e3b}.html.dark .ctp-item.rec.selected .ctp-iname{color:#34d399}
html.dark .ctp-item.tr.selected{background:#2e1065}.html.dark .ctp-item.tr.selected .ctp-iname{color:#a78bfa}
html.dark .ctp-iname{color:#c8daf0}
html.dark .ctp-sub .ctp-iname{color:#8aafd4}
html.dark .ctp-toggle{color:#607090}
@media(prefers-color-scheme:dark){html:not(.light) .ctp-trigger{background:#162035;color:#c8daf0;border-color:#1e2d45}
html:not(.light) .ctp-dropdown{background:#0f1e35;border-color:#1e2d45}
html:not(.light) .ctp-item:hover{background:#162035}
html:not(.light) .ctp-item.selected{background:#1e3a8a}
html:not(.light) .ctp-item.desp.selected{background:#450a0a}
html:not(.light) .ctp-item.rec.selected{background:#064e3b}
html:not(.light) .ctp-item.tr.selected{background:#2e1065}
html:not(.light) .ctp-iname{color:#c8daf0}
html:not(.light) .ctp-sub .ctp-iname{color:#8aafd4}}
/* ─── MODAL FORMULÁRIO DE LANÇAMENTO ─── */
.tx-modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:7000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeOverlay .15s ease}
.tx-modal-box{background:var(--color-background-primary,#fff);border-radius:var(--radius-xl);box-shadow:0 24px 60px rgba(15,23,42,.22),0 8px 24px rgba(15,23,42,.12);padding:22px 22px 18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideDialog .18s cubic-bezier(.34,1.56,.64,1)}
html.dark .tx-modal-box{background:#0f1e35;border:1px solid #1e2d45}
@media(prefers-color-scheme:dark){html:not(.light) .tx-modal-box{background:#0f1e35;border:1px solid #1e2d45}}
/* ─── QUICK-ADD INLINE MODAL (cadastro rápido no lançamento) ─── */
.qam-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeOverlay .15s ease}
.qam-box{background:var(--color-background-primary,#fff);border-radius:var(--radius-xl);box-shadow:0 24px 60px rgba(15,23,42,.22),0 8px 24px rgba(15,23,42,.12);padding:22px 22px 18px;width:100%;max-width:400px;animation:slideDialog .18s cubic-bezier(.34,1.56,.64,1)}
.qam-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.qam-title{font-size:15px;font-weight:700;color:var(--color-text-primary)}
.qam-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);line-height:1;padding:0;transition:color .15s}
.qam-close:hover{color:var(--gray-700)}
.qam-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
/* btn inline ao lado do label */
.fr-add-btn{display:inline-flex;align-items:center;gap:3px;background:none;border:none;font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .12s;font-family:var(--font-sans);line-height:1.4;white-space:nowrap}
.fr-add-btn:hover{background:var(--blue-light)}
.fr-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
html.dark .qam-box{background:#0f1e35;border-color:#1e2d45}
html.dark .fr-add-btn{color:#60a5fa}
html.dark .fr-add-btn:hover{background:#1e3a8a}
@media(prefers-color-scheme:dark){html:not(.light) .qam-box{background:#0f1e35}html:not(.light) .fr-add-btn{color:#60a5fa}html:not(.light) .fr-add-btn:hover{background:#1e3a8a}}

/* ─── CONFIRM BOX (legacy, mantido para compatibilidade) ─── */
.confirm{background:var(--red-light);border:1.5px solid var(--red-mid);border-radius:var(--radius-lg);padding:14px;margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ─── CONFIRM MODAL (centralizado) ─── */
.confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeOverlay .18s ease}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.confirm-dialog{background:var(--color-background-primary,#fff);border-radius:var(--radius-xl);box-shadow:0 24px 60px rgba(15,23,42,.22),0 8px 24px rgba(15,23,42,.12);padding:28px 28px 24px;max-width:380px;width:100%;animation:slideDialog .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideDialog{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.confirm-dialog .cd-icon{font-size:36px;text-align:center;margin-bottom:12px}
.confirm-dialog .cd-title{font-size:17px;font-weight:700;color:var(--color-text-primary,#0F172A);text-align:center;margin-bottom:8px;letter-spacing:-.2px}
.confirm-dialog .cd-msg{font-size:14px;color:var(--color-text-secondary,#475569);text-align:center;line-height:1.5;margin-bottom:22px}
.confirm-dialog .cd-actions{display:flex;gap:10px}
.confirm-dialog .cd-actions button{flex:1;padding:11px 16px;font-size:15px;font-weight:700;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);transition:all .15s;border:none}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--gray-900);color:#fff;padding:11px 20px;border-radius:var(--radius-xl);font-size:14px;font-weight:600;opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.25);letter-spacing:.01em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}

/* ─── TRANSFER BOX ─── */
.trbox{background:var(--purple-light);border:1px solid #C4B5FD;border-radius:var(--radius-lg);padding:14px;display:flex;align-items:center;margin-bottom:14px}
.trs{flex:1;text-align:center}.trs .tl{font-size:11px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.trs .tn{font-size:16px;font-weight:600;color:#3B0764}.trs .tb2{font-size:13px;color:#7C3AED;margin-top:2px}
.trm{padding:0 14px;text-align:center;flex-shrink:0}.trm .ti{font-size:23px;color:var(--purple)}.trm .tv{font-size:15px;font-weight:600;color:#7C3AED;margin-top:4px}

/* ─── ACCOUNT CARDS ─── */
.acc-c{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border-radius:var(--radius-xl);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;flex-wrap:wrap}
.acc-c:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.acc-c.hl{border:2px solid var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.acc-ic{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* ─── CATEGORY BARS ─── */
.bar-row{display:flex;align-items:center;gap:10px}
.bar-bg{flex:2;background:var(--gray-100);border-radius:99px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}

/* ─── CATEGORY GRID ─── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.cat-card{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-radius:var(--radius-md);border:1px solid var(--gray-200);transition:box-shadow .12s}
.cat-card:hover{box-shadow:var(--shadow-sm)}
.cat-card.hl{border:2px solid var(--blue)}
.cat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:15px;font-weight:500;color:var(--gray-800);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── COLOR SWATCHES ─── */
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:var(--gray-900);transform:scale(1.15);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--gray-400)}

/* ─── FIXED CARDS ─── */
.fixa-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border-radius:var(--radius-xl);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;flex-wrap:wrap}
.fixa-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.fixa-card.hl{border:2px solid var(--blue)}
.fixa-card.inativa{opacity:.5}
.fixa-ic{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fixa-info{flex:1;min-width:0}
.fixa-name{font-size:15px;font-weight:700;color:var(--gray-900)}
.fixa-sub{font-size:12px;color:var(--gray-400);margin-top:2px}
.progress-bar{width:100%;background:var(--gray-100);border-radius:99px;height:6px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}

/* ─── PROJECTION ─── */
.proj-month{border-radius:var(--radius-xl);border:1px solid var(--gray-200);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.proj-header{display:flex;align-items:center;padding:14px 18px;cursor:pointer;background:var(--gray-50);gap:10px;user-select:none;transition:background .12s}
.proj-header:hover{background:var(--gray-100)}
.proj-header .ph-name{font-size:15px;font-weight:700;color:var(--gray-800);flex:1}
.proj-body{padding:14px 18px;background:#fff;display:none}
.proj-body.open{display:block}
.proj-header-month-name{font-weight:700}
.proj-header-rec{font-weight:700}
.proj-header-exp{font-weight:700}
.proj-header-saldo-pos,.proj-header-saldo-neg{font-weight:700}
.proj-section-label{font-weight:700}
.proj-section-label-plan{font-weight:700}
.proj-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:14px}
.proj-row:last-child{border-bottom:none}
.proj-row .pr-name{flex:1;color:var(--gray-700)}
.proj-row .pr-type{font-size:11px;padding:2px 7px;border-radius:99px}
.proj-row .pr-val{font-weight:700;font-family:var(--font-mono)}

/* ─── NAV BUTTONS ─── */
.nav-btn{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-md);padding:7px 14px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-600);display:flex;align-items:center;gap:5px;font-family:var(--font-sans);transition:all .15s}
.nav-btn:hover{background:var(--gray-50);border-color:var(--gray-300)}
.chart-wrap{width:100%;height:200px;position:relative}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.month-nav span{font-size:17px;font-weight:700;color:var(--gray-900);flex:1;text-align:center;letter-spacing:-.4px}
.copy-btn{background:var(--blue-light);color:#1D4ED8;border:none;border-radius:var(--radius-md);padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-sans);transition:background .12s,transform .12s}
.copy-btn:hover{background:var(--blue-mid);transform:translateY(-1px)}

/* ─── FAMILY ─── */
.fam-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:var(--purple-light);color:#5B21B6;white-space:nowrap}
.period-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 0 4px}
.period-btn{padding:6px 12px;border-radius:99px;border:1px solid var(--gray-200);font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:var(--gray-500);font-family:var(--font-sans);transition:all .12s}
.period-btn:hover{border-color:var(--gray-300);color:var(--gray-700)}
.period-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.fam-sel{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.fam-chip{padding:5px 12px;border-radius:99px;font-size:15px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);transition:all .15s;font-family:var(--font-sans)}
.fam-chip:hover{border-color:var(--gray-300)}
.fam-chip.sel{border-color:var(--purple);background:var(--purple-light);color:#5B21B6}

/* ─── TRANSACTION CARDS — tabular row style ─── */
.tx-list{display:table;width:100%;border-collapse:collapse;table-layout:fixed}
.tx-col-header{display:table-row}
.tx-col-header .tx-ch{display:table-cell;padding:7px 10px;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--gray-200);white-space:nowrap;background:var(--gray-50)}
/* column widths — match header and data cells exactly */
.tx-ch-icon,.tx-cell-icon{width:28px;padding-left:6px;padding-right:2px}
.tx-ch-main,.tx-cell-main{overflow:hidden;padding-left:4px;min-width:0}
.tx-ch-acc,.tx-cell-acc{width:120px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-ch-cat,.tx-cell-cat{width:130px;max-width:130px;overflow:hidden;white-space:nowrap}
.tx-ch-val,.tx-cell-val{width:120px;text-align:right;white-space:nowrap}
.tx-ch-date,.tx-cell-date{width:82px;text-align:right;white-space:nowrap}
.tx-ch-actions,.tx-cell-actions{width:160px;text-align:right;white-space:nowrap}
/* unified padding for fixed cols */
.tx-ch-acc,.tx-cell-acc,.tx-ch-cat,.tx-cell-cat,.tx-ch-val,.tx-cell-val,.tx-ch-date,.tx-cell-date{padding-left:8px;padding-right:8px}
.tx-ch-actions,.tx-cell-actions{padding-left:4px;padding-right:6px}
/* prevent cat inner span from overflowing */
.tx-cell-cat>span{display:inline-flex;align-items:center;gap:4px;overflow:hidden;max-width:100%}
.tx-cell-cat .tx-cat-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* acc cell text truncation */
.tx-cell-acc{color:var(--gray-500);font-size:13px}
/* ─── RELATÓRIO ─── */
.rel-filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:16px}
.rel-filters label{font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.rel-filters input,.rel-filters select{font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.rel-filters .rel-group{display:flex;flex-direction:column}
.rel-preview{background:var(--color-background-primary);border:1px solid var(--gray-200);border-radius:var(--radius-md);overflow:hidden;margin-top:4px}
.rel-doc{font-family:'DM Sans',sans-serif;color:#1a1a1a;background:#fff;padding:32px 36px;max-width:900px;margin:0 auto}
.rel-doc .rh-title{font-size:20px;font-weight:700;letter-spacing:-.4px;margin:0 0 2px}
.rel-doc .rh-sub{font-size:12px;color:#666;margin:0 0 20px}
.rel-doc .rh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #1a1a1a}
.rel-doc .rh-logo{font-size:22px}
.rel-summ{display:flex;gap:12px;margin-bottom:20px}
.rel-summ .rs{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px}
.rel-summ .rs-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:4px}
.rel-summ .rs-val{font-size:16px;font-weight:700}
.rel-table{width:100%;border-collapse:collapse;font-size:12px}
.rel-table thead th{background:#f8fafc;padding:7px 9px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#475569;border-bottom:1.5px solid #cbd5e1;white-space:nowrap}
.rel-table thead th.r{text-align:right}
.rel-table tbody tr:nth-child(even){background:#fafbfc}
.rel-table tbody td{padding:7px 9px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.rel-table tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
.rel-table .rt-cat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.rel-table tfoot td{padding:8px 9px;font-weight:700;border-top:2px solid #cbd5e1;font-size:12px}
.rel-table tfoot td.r{text-align:right}
.rel-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:10px 9px 5px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.rel-by-cat{margin-top:20px}
.rel-by-cat-row{display:flex;align-items:center;gap:8px;padding:6px 9px;border-bottom:1px solid #f1f5f9;font-size:12px}
.rel-by-cat-row:nth-child(even){background:#fafbfc}
.rel-by-cat-name{flex:1}
.rel-by-cat-bar{height:6px;border-radius:3px;background:#e2e8f0;flex:2;overflow:hidden}
.rel-by-cat-fill{height:100%;border-radius:3px}
.rel-by-cat-val{width:100px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.rel-by-cat-pct{width:38px;text-align:right;color:#64748b;font-size:11px}
/* ─── PRINT ─── */
@media print{
  .topbar,.tabs,.rel-filters,.rel-actions,.toast,#db-bar{display:none!important}
  .cnt{padding:0!important;background:#fff!important}
  .rel-preview{border:none!important;border-radius:0!important}
  .rel-doc{padding:16px 20px!important;max-width:100%!important}
  body,html{background:#fff!important}
  .app{box-shadow:none!important;border-radius:0!important}
  .rel-summ .rs{break-inside:avoid}
  .rel-table tbody tr{break-inside:avoid}
  @page{margin:1.2cm 1.5cm;size:A4 portrait}
}
html.dark .rel-filters input,html.dark .rel-filters select{background:var(--gray-800,#1e293b);border-color:var(--gray-600,#475569);color:var(--color-text-primary)}
html.dark .rel-preview{border-color:var(--gray-300)}

.tx-ch.sortable{cursor:pointer;user-select:none;transition:color .15s}

.tx-body{display:inline-flex;align-items:center;gap:8px;min-width:0;vertical-align:middle}

.tx-chips{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--gray-400);margin-left:6px}
.tx-cat-name{color:var(--gray-500);font-weight:600}
.tx-acc-name{color:var(--gray-400)}
.tx-dot-sep{color:var(--gray-300)}
.tx-fam{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600;background:var(--purple-light);color:#5B21B6;margin-left:2px}
.tx-recur{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600;background:var(--blue-light);color:#1D4ED8;margin-left:2px;cursor:help;position:relative}

.tx-recur-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--gray-900)}
.tx-recur:hover .tx-recur-tip{display:block}
.tx-right{display:inline-flex;flex-direction:row;align-items:center;gap:6px;flex-shrink:0}
.tx-right .tx-val{text-align:right}
.tx-val{font-size:14px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;font-family:var(--font-mono)}
.tx-cell-pct{color:var(--gray-400);font-size:13px}
.tx-cell-date{color:var(--gray-400);font-size:13px}
.tx-val{font-variant-numeric:tabular-nums}
.tx-edit-hint{color:var(--gray-300);font-size:13px;line-height:1}
/* dark */
html.dark .tx-card:hover .tx-cell{background:#162035}
html.dark .tx-cell{border-bottom-color:#1e2d45}html.dark .tx-card:hover .tx-cell{background:unset}

/* ─── TX GROUP ─── */
.tx-group{margin-bottom:4px}
.tx-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 7px;background:var(--gray-50);border-radius:var(--radius-md) var(--radius-md) 0 0;border-bottom:2px solid var(--gray-200);margin-top:8px}
.tx-group-header:first-child{margin-top:0}
.tx-group-title{font-size:13px;font-weight:700;color:var(--gray-700);letter-spacing:-.1px}
.tx-group-totals{display:flex;gap:14px;font-size:13px;font-weight:700;font-family:var(--font-mono)}

/* ─── TX DAY ─── */
.tx-day-block{display:contents}
/* zebra: azul claro / branco alternado */
.tx-card.row-even .tx-cell{background:#EFF6FF}
.tx-card.row-odd  .tx-cell{background:#fff}
.tx-card.row-even:hover .tx-cell{background:#DBEAFE}
.tx-card.row-odd:hover  .tx-cell{background:var(--gray-50)}
html.dark .tx-card.row-even .tx-cell{background:#0c1f40}
html.dark .tx-card.row-odd  .tx-cell{background:#0f1e35}
html.dark .tx-card.row-even:hover .tx-cell{background:#1e3a8a}
html.dark .tx-card.row-odd:hover  .tx-cell{background:#162035}

/* ─── FAMILY FILTER ─── */
.fam-filter-row{display:flex;align-items:center;gap:8px;padding:8px 0 6px;flex-wrap:wrap}
.fam-filter-label{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.fam-edit-box{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 14px;background:var(--purple-light);border-radius:var(--radius-lg);margin-bottom:8px;border:1px solid #DDD6FE}

.fam-edit-input{font-size:13px;padding:6px 12px;border-radius:99px;border:1.5px solid #C4B5FD;width:130px;background:#fff;color:var(--gray-900);font-family:var(--font-sans);outline:none}
.fam-edit-input:focus{border-color:var(--purple)}

/* ─── PERIOD & FAMILY CHIPS ─── */
.fam-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:var(--purple-light);color:#5B21B6;white-space:nowrap}
.period-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 0 4px}
.period-btn{padding:6px 13px;border-radius:99px;border:1.5px solid var(--gray-200);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-500);font-family:var(--font-sans);transition:all .15s}
.period-btn:hover{border-color:var(--gray-300);color:var(--gray-700)}
.period-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.25)}
.fam-sel{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.fam-chip{padding:5px 13px;border-radius:99px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);transition:all .15s;font-family:var(--font-sans)}
.fam-chip:hover{border-color:var(--gray-300)}
.fam-chip.sel{border-color:var(--purple);background:var(--purple-light);color:#5B21B6}

/* ─── EXTRA POLISH ─── */
.bar-row{display:flex;align-items:center;gap:10px}
.bar-bg{flex:2;background:var(--gray-100);border-radius:99px;height:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.cat-card{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);transition:box-shadow .15s,transform .15s}
.cat-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.cat-card.hl{border:2px solid var(--blue)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:14px;font-weight:600;color:var(--gray-800);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:var(--gray-900);transform:scale(1.15);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--gray-400)}
/* ─── ABA SENHAS ─── */
.senha-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border-radius:var(--radius-xl);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;flex-wrap:wrap}

.senha-info{flex:1;min-width:0}
.senha-site{font-size:15px;font-weight:700;color:var(--gray-900)}
.senha-url{font-size:12px;color:var(--blue);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;display:block}
.senha-url:hover{text-decoration:underline}
.senha-field{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:13px;color:var(--gray-600)}
.senha-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-400);min-width:52px}
.senha-val{font-family:var(--font-mono);font-size:13px;color:var(--gray-800)}
.senha-val.hidden{letter-spacing:3px;color:var(--gray-300)}
.senha-copy{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:13px;padding:2px 4px;border-radius:4px;transition:color .1s,background .1s}
.senha-copy:hover{color:var(--blue);background:var(--blue-light)}
.senha-toggle{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:13px;padding:2px 4px;border-radius:4px;transition:color .1s}
.senha-toggle:hover{color:var(--gray-700)}
.senha-obs{font-size:12px;color:var(--gray-500);margin-top:6px;font-style:italic;border-top:1px solid var(--gray-100);padding-top:6px}
.senha-actions{display:flex;gap:6px;flex-shrink:0}
html.dark .senha-card{background:#0f1e35;border-color:#1e2d45}
html.dark .senha-ic{background:#0c1f40}

html.dark .senha-val{color:#c8daf0}

<script type="module">
import { initializeApp, getApps, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ── Configs dos ambientes ──
const FB_CONFIGS = {
  teste: {
    label: '🧪 Teste',
    apiKey: localStorage.getItem('pfp_fb_apikey_teste') || "SUA_API_KEY_TESTE_AQUI",
    authDomain: "personal-finances-9ccb7.firebaseapp.com",
    projectId: "personal-finances-9ccb7",
    storageBucket: "personal-finances-9ccb7.firebasestorage.app",
    messagingSenderId: "299660948262",
    appId: "1:299660948262:web:e4ed144b1e4c0af5a387e7"
  },
  producao: {
    label: '🚀 Produção',
    apiKey: localStorage.getItem('pfp_fb_apikey_producao') || "SUA_API_KEY_PRODUCAO_AQUI",
    authDomain: "personal-finances-prod-7b8ca.firebaseapp.com",
    projectId: "personal-finances-prod-7b8ca",
    storageBucket: "personal-finances-prod-7b8ca.firebasestorage.app",
    messagingSenderId: "130033393114",
    appId: "1:130033393114:web:e449f11cdddf3acdffb4e3"
  }
};

// ── Função para salvar/atualizar API Key e reinicializar Firebase ──
window._fbSaveApiKey = function(env, key) {
  if (!key || !key.trim()) return;
  key = key.trim();
  localStorage.setItem('pfp_fb_apikey_' + env, key);
  FB_CONFIGS[env].apiKey = key;
  // Destrói app existente para forçar reinit com nova key
  try {
    const existing = getApps().find(a => a.name === 'pfp_' + env);
    if (existing) deleteApp(existing);
  } catch(e) {}
  window._fb = _buildFb(env);
  if (window._fb) {
    window._fb.onAuth(_onFbAuthChange);
  }
};

// Ambiente salvo no localStorage (padrão: teste)
let _fbEnv = 'producao'; localStorage.setItem('pfp_fb_env', 'producao'); // sempre produção
window._fbEnv = _fbEnv;

function _buildFb(env) {
  const cfg = FB_CONFIGS[env];
  if (!cfg || !cfg.apiKey) return null;
  try {
    // Evita duplicar apps com mesmo nome
    const existing = getApps().find(a => a.name === 'pfp_' + env);
    const app  = existing || initializeApp(cfg, 'pfp_' + env);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    return { app, db, auth };
  } catch(e) {
    console.warn('Firebase init error:', e);
    return null;
  }
}

let _fbInstance = _buildFb(_fbEnv);

function _makeFbApi(instance) {
  if (!instance) return null;
  const { db, auth } = instance;
  return {
    signIn:  (e,p) => signInWithEmailAndPassword(auth, e, p),
    signUp:  (e,p) => createUserWithEmailAndPassword(auth, e, p),
    signOut: ()    => signOut(auth),
    save:    async (uid, data) => {
      const clone = JSON.parse(JSON.stringify(data));
      await setDoc(doc(db, 'users', uid, 'data', 'main'), clone);
    },
    load:    async (uid) => {
      const snap = await getDoc(doc(db, 'users', uid, 'data', 'main'));
      return snap.exists() ? snap.data() : null;
    },
    onAuth:  (cb)  => onAuthStateChanged(auth, cb),
    getUser: ()    => auth.currentUser,
  };
}

window._fb = _makeFbApi(_fbInstance);
window._fbConfigs = FB_CONFIGS;

// Troca de ambiente
window._fbSwitchEnv = async function(env) {
  if (env === _fbEnv) return;
  // Desloga do ambiente atual
  if (_fbInstance) {
    try { await signOut(_fbInstance.auth); } catch(e) {}
  }
  _fbEnv = env;
  window._fbEnv = env;
  localStorage.setItem('pfp_fb_env', env);
  _fbInstance = _buildFb(env);
  window._fb = _makeFbApi(_fbInstance);
  window._fbUser = null;
  if (_fbInstance) {
    _fbInstance.auth && onAuthStateChanged(_fbInstance.auth, user => {
      window._fbUser = user || null;
      if (typeof _onFbAuthChange === 'function') _onFbAuthChange(user);
    });
  }
  if (typeof _onFbAuthChange === 'function') _onFbAuthChange(null);
};

// Listener de auth apenas para manter estado após login explícito do usuário
// (não é usado para auto-login no boot)
if (_fbInstance) {
  onAuthStateChanged(_fbInstance.auth, user => {
    window._fbUser = user || null;
    if (typeof _onFbAuthChange === 'function') _onFbAuthChange(user);
  });
}
</script>

function buildCatTreePicker(selId,tipo,pickerId,stateKey){
  const tipos=tipo?[tipo]:['despesa','receita','transferencia'];
  if(!A.ctpExp)A.ctpExp={};
  if(!A.ctpExp[pickerId])A.ctpExp[pickerId]={};
  const exp=A.ctpExp[pickerId];
  const selCat=A.cats.find(c=>c.id===selId)||null;
  const selColor=selCat?selCat.color:'#94A3B8';
  const selName=selCat?selCat.name:'Selecione...';
  const selTipo=selCat?selCat.tipo:'';
  const tc=selTipo==='despesa'?'desp':selTipo==='receita'?'rec':selTipo==='transferencia'?'tr':'';
  let items='';
  tipos.forEach(t=>{
    const roots=A.cats.filter(c=>c.tipo===t&&!c.parentId);
    roots.forEach(root=>{
      const rid=root.id;
      const subs=A.cats.filter(c=>c.parentId===rid);
      const hasSub=subs.length>0;
      const rootSel=selId===rid;
      const rtc=t==='despesa'?'desp':t==='receita'?'rec':'tr';
      const expanded=exp[rid]===true;
      const tog=hasSub
        ?`<div class="ctp-toggle" onclick="event.stopPropagation();A.ctpExp['${pickerId}'][${rid}]=A.ctpExp['${pickerId}'][${rid}]===true?false:true;_ctpRender('${pickerId}')">${expanded?'▼':'▶'}</div>`
        :`<div class="ctp-toggle"></div>`;
      items+=`<div class="ctp-item ctp-root ${rtc} ${rootSel?'selected':''}" onclick="${stateKey}=${rid};render();_ctpClose('${pickerId}')">${tog}<div class="ctp-idot" style="background:${root.color}"></div><div class="ctp-iname">${H(root.name)}</div></div>`;
      if(hasSub){
        items+=`<div class="ctp-children ${expanded?'open':''}" id="ctpc-${pickerId}-${rid}">`;
        subs.forEach(sub=>{
          const subSel=selId===sub.id;
          items+=`<div class="ctp-item ctp-sub ${rtc} ${subSel?'selected':''}" onclick="${stateKey}=${sub.id};render();_ctpClose('${pickerId}')"><div class="ctp-toggle"></div><div class="ctp-idot" style="background:${sub.color}"></div><div class="ctp-iname">${H(sub.name)}</div></div>`;
        });
        items+=`</div>`;
      }
    });
  });
  return`<div class="ctp-wrap" id="ctpw-${pickerId}"><button type="button" class="ctp-trigger ${tc}" id="ctpt-${pickerId}" onclick="_ctpToggle('${pickerId}')"><div class="ctp-dot" style="background:${selColor}"></div><span class="ctp-label">${H(selName)}</span><span class="ctp-arrow">▼</span></button><div class="ctp-dropdown" id="ctpd-${pickerId}">${items}</div></div>`;
}

const accBy=id=>A.accounts.find(a=>a.id==id)||{name:'?',id:0};
function bal(acc){
  let b=acc.ini||0;
  const active=acc.iniDateActive===true||acc.iniDateActive==='true';
  const iniD=acc.iniDate&&acc.iniDate.length===10?acc.iniDate:'';
  const cutoff=(active&&iniD)?iniD:null;
  A.txs.filter(t=>t.done&&(!cutoff||t.date>=cutoff)).forEach(t=>{
    if(t.type==='transferencia'){if(t.accId==acc.id)b-=t.val;if(t.accDest==acc.id)b+=t.val;}
    else if(t.accId==acc.id)b+=t.type==='receita'?t.val:-t.val;
  });
  return b;
}
// Retorna quantos lançamentos foram ignorados pelo cutoff desta conta
function balIgnorados(acc){
  const active=acc.iniDateActive===true||acc.iniDateActive==='true';
  const iniD=acc.iniDate&&acc.iniDate.length===10?acc.iniDate:'';
  if(!active||!iniD) return 0;
  return A.txs.filter(t=>t.done&&t.accId==acc.id&&t.date<iniD).length;
}
const isCC=acc=>acc&&acc.type==='Cartão de crédito';

function balView(acc){const b=bal(acc);if(isCC(acc)){const fatura=-b;return{val:fatura,label:'Fatura',color:fatura>0?'#DC2626':fatura<0?'#059669':'#6B7280'};}return{val:b,label:'Saldo',color:b>=0?'#059669':'#DC2626'};}
function filt(){return A.txs.filter(t=>t.done&&(A.filt==='all'||t.accId==A.filt||t.accDest==A.filt));}
function sumT(arr,type){return arr.filter(t=>t.type===type).reduce((s,t)=>s+t.val,0);}

// Calcula fixas ativas para um mês (respeita periodicidade)
function fixasParaMes(mes){
  return A.fixas.filter(f=>{
    if(!f.ativa) return false;
    // Âncora = inicioEm se definido, senão primeiro pagamento, senão não restringe (legado)
    const anchor=f.inicioEm||(Object.keys(f.pagamentos||{}).sort()[0]||null);
    // Se tem âncora, o mês consultado não pode ser anterior a ela
    if(anchor){
      const [ay,am]=anchor.split('-').map(Number);
      const [fy,fm]=mes.split('-').map(Number);
      const diff=(fy-ay)*12+(fm-am);
      if(diff<0) return false;
      if(f.recur==='mensal')      return true;
      if(f.recur==='bimestral')   return diff%2===0;
      if(f.recur==='trimestral')  return diff%3===0;
      if(f.recur==='semestral')   return diff%6===0;
      if(f.recur==='anual')       return diff%12===0;
      return false;
    }
    // Sem âncora (fixas legadas sem inicioEm): usa comportamento anterior
    if(f.recur==='mensal') return true;
    const pagMeses=Object.keys(f.pagamentos||{}).sort();
    const legacyAnchor=pagMeses.length>0?pagMeses[0]:thisMonth();
    const [ay,am]=legacyAnchor.split('-').map(Number);
    const [fy,fm]=mes.split('-').map(Number);
    const diff=(fy-ay)*12+(fm-am);
    if(diff<0) return false;
    if(f.recur==='bimestral')   return diff%2===0;
    if(f.recur==='trimestral')  return diff%3===0;
    if(f.recur==='semestral')   return diff%6===0;
    if(f.recur==='anual')       return diff%12===0;
    return false;
  });
}

function bulkToggle(id,e){e.stopPropagation();if(!A.bulkSel)A.bulkSel=new Set();if(A.bulkSel.has(id))A.bulkSel.delete(id);else A.bulkSel.add(id);render();}
function bulkSelectAll(){const txs=lancFiltTxs();if(!A.bulkSel)A.bulkSel=new Set();txs.forEach(t=>A.bulkSel.add(t.id));render();}
function bulkSelectNone(){A.bulkSel=new Set();render();}
function bulkExit(){A.bulkMode=false;A.bulkSel=new Set();render();}
function bulkDelete(){
  const n=A.bulkSel?A.bulkSel.size:0;
  if(!n)return;
  // Verifica quantas fixas serão reativadas (para mostrar no aviso)
  let fixasPreview=0;
  A.bulkSel.forEach(id=>{
    A.fixas.forEach(f=>{
      if(!f.pagamentos)return;
      if(Object.keys(f.pagamentos).some(m=>f.pagamentos[m]===id))fixasPreview++;
    });
  });
  const fixaWarn=fixasPreview>0
    ?`<br><span style="font-size:12px;color:#D97706;display:inline-block;margin-top:6px">⚠️ ${fixasPreview} conta${fixasPreview!==1?'s':''} fixa${fixasPreview!==1?'s':''} voltará${fixasPreview!==1?'o':''} para pendente.</span>`
    :'';
  _showConfirm(
    `Excluir ${n} lançamento${n!==1?'s':''}?`,
    `Esta ação não pode ser desfeita.${fixaWarn}`,
    ()=>{
      let fixasReativadas=0;
      A.bulkSel.forEach(id=>{
        A.fixas.forEach(f=>{
          if(!f.pagamentos)return;
          const mes=Object.keys(f.pagamentos).find(m=>f.pagamentos[m]===id);
          if(mes){delete f.pagamentos[mes];fixasReativadas++;}
        });
      });
      A.txs=A.txs.filter(t=>!A.bulkSel.has(t.id));
      const msg=`${n} lançamento${n!==1?'s':''} excluído${n!==1?'s':''}${fixasReativadas>0?` · ${fixasReativadas} conta${fixasReativadas!==1?'s':''} fixa${fixasReativadas!==1?'s':''} reativada${fixasReativadas!==1?'s':''}`:''}.`;
      A.bulkSel=new Set();
      A.bulkMode=false;
      toast(msg,'#888780');
      render();
    }
  );
}

/* ─── SORT HELPERS (global — used by rFixas and rLanc) ─── */
function txSortFn(col,dir){
  const d=dir==='asc'?1:-1;
  return(a,b)=>{
    if(col==='desc')return d*(a.desc||'').localeCompare(b.desc||'');
    if(col==='acc'){const an=accBy(a.accId)?.name||'';const bn=accBy(b.accId)?.name||'';return d*an.localeCompare(bn);}
    if(col==='cat'){const an=catBy(a.catId)?.name||'';const bn=catBy(b.catId)?.name||'';return d*an.localeCompare(bn);}
    if(col==='val')return d*(a.val-b.val);
    if(col==='date')return d*(a.date||'').localeCompare(b.date||'');
    return 0;
  };
}
function fixaSortFn(col,dir){
  const d=dir==='asc'?1:-1;
  return(a,b)=>{
    if(col==='desc')return d*(a.desc||'').localeCompare(b.desc||'');
    if(col==='acc'){const an=accBy(a.accId)?.name||'';const bn=accBy(b.accId)?.name||'';return d*an.localeCompare(bn);}
    if(col==='cat'){const an=catBy(a.catId)?.name||'';const bn=catBy(b.catId)?.name||'';return d*an.localeCompare(bn);}
    if(col==='val')return d*(a.val-b.val);
    if(col==='date')return d*(a.diaVenc-b.diaVenc);
    return 0;
  };
}
function makeSortHeaderFixa(col,label,group){
  if(!A.fixaSort)A.fixaSort={};
  const s=A.fixaSort[group]||{col:'date',dir:'asc'};
  const isActive=s.col===col;
  const arrow=isActive?(s.dir==='asc'?'▲':'▼'):'⇅';
  const colCls=col==='desc'?'tx-ch-main':col==='acc'?'tx-ch-acc':col==='cat'?'tx-ch-cat':col==='val'?'tx-ch-val':col==='date'?'tx-ch-date':'';
  const cls=['tx-ch',colCls,'sortable',isActive?'sort-active':''].filter(Boolean).join(' ');
  return`<div class="${cls}" onclick="if(!A.fixaSort)A.fixaSort={};const _s=A.fixaSort['${group}']||{col:'date',dir:'asc'};A.fixaSort['${group}']={col:'${col}',dir:_s.col==='${col}'?(_s.dir==='asc'?'desc':'asc'):'asc'};render()">${label}<span class="sort-arrow">${arrow}</span></div>`;
}
function makeTxSortHeader(col,label,extraClass){
  const isActive=A.txSort===col;
  const dir=A.txSortDir||'desc';
  const arrow=isActive?(dir==='asc'?'▲':'▼'):'⇅';
  const cls=['tx-ch',extraClass||'','sortable',isActive?'sort-active':''].filter(Boolean).join(' ');
  return`<div class="${cls}" onclick="if(A.txSort==='${col}'){A.txSortDir=A.txSortDir==='asc'?'desc':'asc';}else{A.txSort='${col}';A.txSortDir='asc';}render()">${label}<span class="sort-arrow">${arrow}</span></div>`;
}

function copiarParaProximoMes(mes){
  const proximo=addMonths(mes,1);
  let copiadas=0,ignoradas=0;

  A.fixas.filter(f=>f.ativa).forEach(f=>{
    if(!f.pagamentos) f.pagamentos={};

    // Pula fixas que ainda não foram pagas no mês atual
    if(!f.pagamentos[mes]) return;

    // Pula se já marcada no próximo mês
    if(f.pagamentos[proximo]!==undefined){ignoradas++;return;}

    // Cria lançamento no próximo mês com o mesmo dia de vencimento
    const[y,mo]=proximo.split('-');
    const d=String(f.diaVenc||1).padStart(2,'0');
    const txId=A.nid++;
    A.txs.push({
      id:txId,type:f.type,desc:f.desc+' (fixa)',
      val:f.val,date:`${y}-${mo}-${d}`,
      catId:f.catId,accId:f.accId,accDest:null,
      recur:f.recur,obs:f.obs,planned:false,done:true
    });
    f.pagamentos[proximo]=txId;
    copiadas++;
  });

  A.fixaMes=proximo;
  const [yp,mp]=proximo.split('-');
  const nomeMes=`${MNLONG[mp]}/${yp}`;
  if(copiadas===0 && ignoradas===0)
    toast(`Nenhuma conta paga em ${MNLONG[mes.split('-')[1]]} para copiar.`,'#888780');
  else if(copiadas===0)
    toast(`Todas as contas já estavam lançadas em ${nomeMes}.`,'#888780');
  else
    toast(`${copiadas} lançamento(s) copiado(s) para ${nomeMes}!`,'#1D9E75');
  render();
}

function marcarPago(id,mes){
  const f=A.fixas.find(x=>x.id===id);if(!f)return;
  if(!f.pagamentos)f.pagamentos={};
  const[y,mo]=mes.split('-');const d=String(f.diaVenc).padStart(2,'0');
  const txId=A.nid++;
  A.txs.push({id:txId,type:f.type,desc:f.desc+' (fixa)',val:f.val,date:`${y}-${mo}-${d}`,catId:f.catId,accId:f.accId,accDest:null,recur:f.recur,obs:f.obs,planned:false,done:true});
  f.pagamentos[mes]=txId;
  toast(f.type==='receita'?'Recebido! Lançamento criado.':'Lançamento criado.','#1D9E75');render();
}
function desmarcarPago(id,mes){
  const f=A.fixas.find(x=>x.id===id);if(!f||!f.pagamentos)return;
  const txId=f.pagamentos[mes];
  if(typeof txId==='number')A.txs=A.txs.filter(t=>t.id!==txId);
  delete f.pagamentos[mes];
  toast('Desmarcado e lançamento removido.','#888780');render();
}
function toggleAtiva(id){const f=A.fixas.find(x=>x.id===id);if(!f)return;f.ativa=!f.ativa;toast(f.ativa?'Ativada!':'Pausada.','#888780');render();}
function openFixaForm(){A.feId=null;A.delFixa=null;A.ctpExp={};A.ff={type:'despesa',desc:'',val:'',diaVenc:5,catId:null,accId:A.accounts[0]?.id||1,recur:'mensal',ativa:true,icon:'💧',obs:'',inicioEm:A.fixaMes,open:true};render();}

function saveFixa(){const f=A.ff;if(!f.desc.trim()||!f.val||parseFloat(f.val)<=0){toast('Preencha descrição e valor.','#E24B4A');return;}const obj={...f,val:parseFloat(f.val),diaVenc:parseInt(f.diaVenc)||5,inicioEm:f.inicioEm||A.fixaMes};delete obj.open;if(A.feId!==null){const i=A.fixas.findIndex(x=>x.id===A.feId);if(i!==-1)A.fixas[i]={...A.fixas[i],...obj};toast('Atualizada!');}else{A.fixas.push({id:A.nid++,...obj,pagamentos:{}});toast('Criada!');}closeFixaForm();}
function askDelFixa(id){
