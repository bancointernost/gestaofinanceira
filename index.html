/* ═══════════════════════════════════════════════════════════
   COFRE CRIPTOGRAFADO — WebCrypto AES-GCM + PBKDF2
   ═══════════════════════════════════════════════════════════
   Fluxo:
   • A.senhas[] armazena apenas dados CIFRADOS {id,site,url,enc,iv,salt}
   • A.cofre.senhasDecrypt[] é o cache descriptografado em memória (apagado ao travar)
   • A senha master NUNCA é persistida — só a chave derivada fica em memória
   • Suporte a migração de dados antigos (texto puro → criptografado ao definir master)
   ═══════════════════════════════════════════════════════════ */

const VAULT_META_KEY = 'pfp_vault_meta'; // localStorage: {salt, verifier}

// ── Utilitários de bytes ──
function _b64e(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function _b64d(s){ const b=atob(s); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u.buffer; }
function _rand(n){ const b=new Uint8Array(n); crypto.getRandomValues(b); return b; }

// ── Derivação de chave (PBKDF2 → AES-GCM) ──
async function _deriveKey(password, salt){
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:310000, hash:'SHA-256'},
    base,
    {name:'AES-GCM', length:256},
    false,
    ['encrypt','decrypt']
  );
}

// ── Cifrar string → {enc, iv} (base64) ──
async function _encrypt(key, plaintext){
  const iv = _rand(12);
  const enc = new TextEncoder();
  const buf = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  return {enc: _b64e(buf), iv: _b64e(iv.buffer)};
}

// ── Decifrar {enc, iv} → string ──
async function _decrypt(key, enc, iv){
  try{
    const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv: new Uint8Array(_b64d(iv))}, key, _b64d(enc));
    return new TextDecoder().decode(buf);
  }catch(e){ return null; }
}

// ── Verifica se senha master está definida ──
function vaultHasMaster(){
  return !!localStorage.getItem(VAULT_META_KEY);
}

// ── Carrega metadados (salt + verifier) ──
function _vaultLoadMeta(){
  try{ return JSON.parse(localStorage.getItem(VAULT_META_KEY)||'null'); }catch(e){ return null; }
}

// ── Verifica senha master (tenta decifrar o verifier) ──
async function vaultVerify(password){
  const meta = _vaultLoadMeta();
  if(!meta) return false;
  const salt = new Uint8Array(_b64d(meta.salt));
  const key = await _deriveKey(password, salt);
  const plain = await _decrypt(key, meta.verifierEnc, meta.verifierIv);
  return plain === 'pfp-vault-ok';
}

// ── Registra chaves delegadas para todos os admins ──
// Cada admin tem sua senha cifrada com a senha master, para poder desbloquear
async function _vaultRegisterAdminKeys(masterPass){
  const meta = _vaultLoadMeta();
  if(!meta) return;
  const admins = (A.usuarios||[]).filter(u=>u.papel==='admin'&&u.senhaHash);
  // adminKeys[userId] = {salt, enc, iv} — masterPass cifrado com derivação da senha do admin
  // Como não temos a senha plain do admin (só hash), usamos uma abordagem diferente:
  // Armazenamos a masterPass cifrada com uma chave derivada do HASH sha256 do admin como "senha"
  // Assim: ao desbloquear com senha do admin, derivamos a chave do sha256 e decriptamos a masterPass
  if(!meta.adminKeys) meta.adminKeys={};
  for(const admin of admins){
    const adminSalt = _rand(32);
    // Usa o SHA-256 hex da senha do admin como material de chave (é o que temos armazenado)
    const adminKey = await _deriveKey(admin.senhaHash, adminSalt);
    const {enc, iv} = await _encrypt(adminKey, masterPass);
    meta.adminKeys[admin.id] = {salt: _b64e(adminSalt.buffer), enc, iv};
  }
  localStorage.setItem(VAULT_META_KEY, JSON.stringify(meta));
}

// ── Define senha master (primeira vez ou redefinição) ──
async function vaultSetMaster(password){
  const salt = _rand(32);
  const key = await _deriveKey(password, salt);
  const {enc, iv} = await _encrypt(key, 'pfp-vault-ok');
  const meta = {salt: _b64e(salt.buffer), verifierEnc: enc, verifierIv: iv, adminKeys:{}};
  localStorage.setItem(VAULT_META_KEY, JSON.stringify(meta));
  A.cofre.key = key;
  A.cofre.locked = false;
  A.cofre.masterSet = true;
  // Registra chaves delegadas para admins existentes
  await _vaultRegisterAdminKeys(password);
  return key;
}

// ── Desbloqueia o cofre com senha master ──
async function vaultUnlock(password){
  const ok = await vaultVerify(password);
  if(!ok) return false;
  const meta = _vaultLoadMeta();
  const salt = new Uint8Array(_b64d(meta.salt));
  const key = await _deriveKey(password, salt);
  A.cofre.key = key;
  A.cofre.locked = false;
  A.cofre.masterSet = true;
  // Descriptografa todas as senhas para cache em memória
  await _vaultDecryptAll();
  return true;
}

// ── Trava o cofre (apaga chave e cache da memória) ──
function vaultLock(){
  A.cofre.key = null;
  A.cofre.locked = true;
  A.cofre.senhasDecrypt = null;
  A.senhaMostrar = {};
  sessionStorage.removeItem('_vmp');
  render();
  toast('🔒 Cofre travado.', '#475569');
}

// ── Descriptografa todos os registros para o cache em memória ──
async function _vaultDecryptAll(){
  if(!A.cofre.key) return;
  const results = [];
  for(const s of (A.senhas||[])){
    if(s.enc){
      // Registro criptografado
      const usuario = s.encU ? (await _decrypt(A.cofre.key, s.encU, s.ivU)||'') : (s.usuario||'');
      const senha   = s.enc  ? (await _decrypt(A.cofre.key, s.enc,  s.iv )||'') : '';
      results.push({...s, _usuario: usuario, _senha: senha});
    } else {
      // Registro legado (texto puro) — ainda não migrado
      results.push({...s, _usuario: s.usuario||'', _senha: s.senha||''});
    }
  }
  A.cofre.senhasDecrypt = results;
}

// ── Cifra um registro e salva em A.senhas ──
async function _vaultEncryptRecord(id, site, url, usuario, senhaPlain, obs){
  if(!A.cofre.key) throw new Error('Cofre travado');
  const {enc: encU, iv: ivU} = await _encrypt(A.cofre.key, usuario);
  const {enc, iv}             = await _encrypt(A.cofre.key, senhaPlain);
  return {id, site, url, obs, enc, iv, encU, ivU, _crypt: true};
}

// ── Migra registros de texto puro → criptografados ──
async function vaultMigrateAll(){
  if(!A.cofre.key) return;
  const migrated = [];
  for(const s of (A.senhas||[])){
    if(s._crypt || s.enc){
      // Já criptografado
      migrated.push(s);
    } else {
      // Texto puro — migrar
      const rec = await _vaultEncryptRecord(s.id, s.site||'', s.url||'', s.usuario||'', s.senha||'', s.obs||'');
      migrated.push(rec);
    }
  }
  A.senhas = migrated;
  await _vaultDecryptAll();
  dbSave();
}

function _vaultStrength(pass){
  const fill = document.getElementById('vault-strength-fill');
  const lbl  = document.getElementById('vault-strength-label');
  if(!fill||!lbl) return;
  let score = 0;
  if(pass.length >= 8)  score++;
  if(pass.length >= 12) score++;
  if(/[A-Z]/.test(pass)) score++;
  if(/[0-9]/.test(pass)) score++;
  if(/[^A-Za-z0-9]/.test(pass)) score++;
  const levels = [
    {pct:0,   color:'#DC2626', label:''},
    {pct:20,  color:'#DC2626', label:'⚠️ Muito fraca'},
    {pct:40,  color:'#D97706', label:'🔶 Fraca'},
    {pct:60,  color:'#F59E0B', label:'🟡 Média'},
    {pct:80,  color:'#059669', label:'🟢 Boa'},
    {pct:100, color:'#065F46', label:'✅ Forte'},
  ];
  const l = levels[score]||levels[0];
  fill.style.width  = l.pct + '%';
  fill.style.background = l.color;
  lbl.textContent = pass.length ? l.label : '';
}

  if(p1.length < 8){ _vaultShowErr('A senha master deve ter pelo menos 8 caracteres.'); return; }
  if(p1 !== p2){ _vaultShowErr('As senhas não coincidem.'); return; }
  if(btn){ btn.textContent='⏳ Criando cofre…'; btn.disabled=true; }
  await vaultSetMaster(p1);
  await vaultMigrateAll();
  sessionStorage.setItem('_vmp', p1);
  toast('🔐 Cofre criado e criptografado com sucesso!','#059669',4000);
  render();
}

async function vaultDoUnlock(){
  const p = document.getElementById('vault-pass1')?.value||'';
  const btn = document.getElementById('vault-submit-btn');
  if(!p){ _vaultShowErr('Digite a senha master ou sua senha de admin.'); return; }
  if(btn){ btn.textContent='⏳ Verificando…'; btn.disabled=true; }

  // 1ª tentativa: senha master
  let ok = await vaultUnlock(p);

  // 2ª tentativa: senha de algum admin cadastrado
  if(!ok){
    const hash = await _sha256(p);
    const adminUser = (A.usuarios||[]).find(u=>u.papel==='admin' && u.senhaHash===hash);
    if(adminUser){
      // Usa a senha master para derivar a chave, mas autentica via senha do admin
      // O cofre precisa da senha master real para descriptografar — usamos a senha do admin
      // como senha master alternativa: verificamos se o cofre tem um verifier alternativo p/ este admin
      const metaRaw = localStorage.getItem(VAULT_META_KEY);
      const meta = metaRaw ? JSON.parse(metaRaw) : null;
      if(meta && meta.adminKeys && meta.adminKeys[adminUser.id]){
        // Admin tem uma chave delegada: masterPass cifrada com derivação do senhaHash do admin
        const adminKeyData = meta.adminKeys[adminUser.id];
        const adminSalt = new Uint8Array(_b64d(adminKeyData.salt));
        // A chave foi derivada com o senhaHash (hex string) como "senha"
        const adminDerivedKey = await _deriveKey(adminUser.senhaHash, adminSalt);
        const masterPassPlain = await _decrypt(adminDerivedKey, adminKeyData.enc, adminKeyData.iv);
        if(masterPassPlain){
          ok = await vaultUnlock(masterPassPlain);
          if(ok){
            _sessionSet(adminUser);
            sessionStorage.setItem('_vmp', masterPassPlain);
          }
        }
      }
    }
  }

  if(!ok){
    if(btn){ btn.textContent='🔓 Desbloquear'; btn.disabled=false; }
    await new Promise(r=>setTimeout(r,500));
    _vaultShowErr('Senha incorreta. Use a senha master ou sua senha de admin.');
    document.getElementById('vault-pass1').value='';
    document.getElementById('vault-pass1').focus();
    return;
  }
  // Guarda na sessionStorage para poder re-registrar admins sem pedir a senha de novo
  sessionStorage.setItem('_vmp', p);
  toast('🔓 Cofre desbloqueado!','#059669');
  render();
}

function rRelatorio(m){
  if(!A.relFilt){A.relFilt={period:'mes',mes:thisMonth(),dtIni:'',dtFim:'',tipo:'todos',accId:'all',catId:'all',grp:'data',showCats:true,showFixas:false,showPlan:true};}
  if(A.relFilt.showPlan===undefined)A.relFilt.showPlan=true;
  const f=A.relFilt;
  const ano=String(A.anoFilt);

  // ── helper de filtro de período ──
  function filtPeriodo(t){
    if(!t.date)return false;
    if(f.period==='mes'){const m2=ano+'-'+f.mes.slice(5,7);return t.date.startsWith(m2);}
    if(f.period==='ano')return t.date.startsWith(ano);
    if(f.period==='custom')return f.dtIni&&f.dtFim?t.date>=f.dtIni&&t.date<=f.dtFim:false;
    return true;
  }

  // ── lançamentos efetivados ──
  let txs=A.txs.filter(t=>t.done);
  if(f.accId!=='all')txs=txs.filter(t=>String(t.accId)===String(f.accId));
  txs=txs.filter(filtPeriodo);
  if(f.tipo!=='todos')txs=txs.filter(t=>t.type===f.tipo);
  if(f.catId!=='all')txs=txs.filter(t=>String(t.catId)===String(f.catId));
  txs=[...txs].sort((a,b)=>a.date.localeCompare(b.date));

  // ── lançamentos planejados (planned=true, done=false) ──
  let planTxs=[];
  if(f.showPlan){
    planTxs=A.txs.filter(t=>t.planned&&!t.done);
    if(f.accId!=='all')planTxs=planTxs.filter(t=>String(t.accId)===String(f.accId));

    const planBadge=isPlanned?'<span style="font-size:9px;background:#EDE9FE;color:#7C3AED;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;vertical-align:middle">📅 plan.</span>':'';

    const valStyle=isPlanned?'color:'+valColor+';font-weight:600;opacity:.7':'color:'+valColor+';font-weight:600';
    let dateTd;
    if(dateLabel!=null){
      dateTd='<td style="color:#334155;font-size:11px;font-weight:700;white-space:nowrap">'+dateLabel+'</td>';
    } else if(hideDate){
      dateTd='<td></td>';
    } else {
      dateTd='<td style="color:#64748b;font-size:11px">'+dd+'/'+dm+'/'+dy+'</td>';
    }
    return '<tr style="'+rowBg+'">'
      +dateTd
      +'<td>'+H(t.desc)+planBadge+'</td>'
      +'<td style="color:#64748b">'+H(acc.name)+'</td>'
      +'<td><span class="rt-cat-dot" style="background:'+cat.color+'"></span>'+H(cat.name)+'</td>'

  // ── linhas da tabela ──
  let bodyRows='';
  const allTxs=[...txs.map(t=>({...t,_plan:false})),...planTxs.map(t=>({...t,_plan:true}))];
  allTxs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  if(f.grp==='data'){
    const byDay={};
    allTxs.forEach(t=>{const k=t.date||'sem-data';if(!byDay[k])byDay[k]=[];byDay[k].push(t);});
    Object.keys(byDay).sort().forEach(d=>{
      const[dy,dm,dd]=(d!=='sem-data'?d:'0000-00-00').split('-');
      const label=d!=='sem-data'?dd+'/'+dm+'/'+dy:'Sem data';
      byDay[d].forEach((t,idx)=>{bodyRows+=makeRow(t,t._plan,false,idx===0?label:null);});

function printRelatorio(){

function exportRelatorioXLSX(){
  if(!A.relFilt)return;
  const f=A.relFilt;
  const ano=String(A.anoFilt);

  function filtPeriodo(t){
    if(!t.date)return false;
    if(f.period==='mes'){const m2=ano+'-'+f.mes.slice(5,7);return t.date.startsWith(m2);}
    if(f.period==='ano')return t.date.startsWith(ano);
    if(f.period==='custom')return f.dtIni&&f.dtFim?t.date>=f.dtIni&&t.date<=f.dtFim:false;
    return true;
  }

  let txs=A.txs.filter(t=>t.done);
  if(f.accId!=='all')txs=txs.filter(t=>String(t.accId)===String(f.accId));
  txs=txs.filter(filtPeriodo);
  if(f.tipo!=='todos')txs=txs.filter(t=>t.type===f.tipo);
  if(f.catId!=='all')txs=txs.filter(t=>String(t.catId)===String(f.catId));
  txs=[...txs].sort((a,b)=>a.date.localeCompare(b.date));

  let planTxs=[];
  if(f.showPlan){
    planTxs=A.txs.filter(t=>t.planned&&!t.done);
    if(f.accId!=='all')planTxs=planTxs.filter(t=>String(t.accId)===String(f.accId));
    planTxs=planTxs.filter(filtPeriodo);
    if(f.tipo!=='todos')planTxs=planTxs.filter(t=>t.type===f.tipo);
    if(f.catId!=='all')planTxs=planTxs.filter(t=>String(t.catId)===String(f.catId));
    planTxs=[...planTxs].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }

  let periodoLabel='';
  if(f.period==='mes'){const[yy,mm]=f.mes.split('-');periodoLabel=MNLONG[mm]+'_'+yy;}
  else if(f.period==='ano')periodoLabel='Ano_'+ano;
  else if(f.period==='custom'&&f.dtIni&&f.dtFim)periodoLabel=f.dtIni.replace(/-/g,'')+'_a_'+f.dtFim.replace(/-/g,'');
  else periodoLabel='Personalizado';

  const wb=XLSX.utils.book_new();

  function txToRow(t,status){
    const cat=catBy(t.catId);
    const acc=accBy(t.accId);
    const[dy,dm,dd]=(t.date||'').split('-');
    const dataFmt=t.date?dd+'/'+dm+'/'+dy:'';
    const sinal=t.type==='receita'?1:-1;
    return{
      'Data':dataFmt,
      'Descricao':t.desc||'',
      'Tipo':t.type==='receita'?'Receita':t.type==='despesa'?'Despesa':'Transferencia',
      'Status':status,
      'Conta':acc.name||'',
      'Categoria':cat.name||'',
      'Valor':+(t.val*sinal).toFixed(2),
      'Observacao':t.obs||''
    };
  }

  const rowsLanc=[
    ...txs.map(t=>txToRow(t,'Efetivado')),
    ...planTxs.map(t=>txToRow(t,'Planejado'))
  ];

  const wsLanc=XLSX.utils.json_to_sheet(rowsLanc,{header:['Data','Descricao','Tipo','Status','Conta','Categoria','Valor','Observacao']});
  wsLanc['!cols']=[{wch:12},{wch:36},{wch:12},{wch:12},{wch:18},{wch:22},{wch:14},{wch:28}];
  XLSX.utils.book_append_sheet(wb,wsLanc,'Lancamentos');

  if(f.showCats&&txs.length>0){
    const byC={};
    txs.filter(t=>t.type==='despesa').forEach(t=>{if(!byC[t.catId])byC[t.catId]=0;byC[t.catId]+=t.val;});
    const totalDespesas=Object.values(byC).reduce((s,v)=>s+v,0)||1;
    const rowsCat=Object.entries(byC).sort((a,b)=>b[1]-a[1]).map(([cid,v])=>{
      const cat=catBy(cid);
      return{'Categoria':cat.name||'','Total':+v.toFixed(2),'Percentual':+(v/totalDespesas*100).toFixed(1)};
    });
    const wsCat=XLSX.utils.json_to_sheet(rowsCat,{header:['Categoria','Total','Percentual']});
    wsCat['!cols']=[{wch:28},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,wsCat,'Despesas por Categoria');
  }

  if(f.showFixas){
    const fixas=(A.fixas||[]).filter(fx=>fx.ativa!==false);
    if(fixas.length>0){
      const rowsFixas=fixas.map(fx=>{
        const cat=catBy(fx.catId);const acc=accBy(fx.accId);
        return{'Descricao':fx.desc||'','Tipo':fx.type==='receita'?'Receita':'Despesa','Conta':acc.name||'','Categoria':cat.name||'','Dia Vencimento':fx.diaVenc||'','Valor':+fx.val.toFixed(2),'Periodicidade':fx.recur||'mensal'};
      });
      const wsFixas=XLSX.utils.json_to_sheet(rowsFixas,{header:['Descricao','Tipo','Conta','Categoria','Dia Vencimento','Valor','Periodicidade']});
      wsFixas['!cols']=[{wch:30},{wch:10},{wch:18},{wch:22},{wch:16},{wch:12},{wch:14}];
      XLSX.utils.book_append_sheet(wb,wsFixas,'Contas Fixas');
    }
  }

  const fileName='Relatorio_'+periodoLabel+'.xlsx';
  XLSX.writeFile(wb,fileName);
  toast('Exportado: '+fileName,'#059669');
}



/* ═══════════════════════════════════════════════════════════
   SISTEMA DE LOGIN — Usuários do Sistema
   ═══════════════════════════════════════════════════════════
   • Senha armazenada como SHA-256 hex
   • Sessão em memória (window._appSession) — apagada ao fechar a aba
   • Papéis: admin (acesso total), usuario (acesso padrão), visitante (somente leitura)
   • Se não há usuários cadastrados, o app abre sem login (modo inicial)
   ═══════════════════════════════════════════════════════════ */

// ── SHA-256 via WebCrypto ──
// ── Sessão atual (em memória) ──
window._appSession = null; // {id, nome, login, papel}

function _sessionSet(user){
  window._appSession = {id:user.id, nome:user.nome, login:user.login, papel:user.papel||'usuario'};
  // Atualiza chip no topbar
  const chip  = document.getElementById('session-chip');
  const name  = document.getElementById('session-name');
  const avatar= document.getElementById('session-avatar');
  if(chip){ chip.style.display='flex'; }
  if(name){ name.textContent = user.nome||user.login; }
  if(avatar){ avatar.textContent = (user.nome||user.login||'?')[0].toUpperCase(); }
}

function _sessionClear(){
  window._appSession = null;
  const chip = document.getElementById('session-chip');
  if(chip) chip.style.display='none';
}

// ── Verifica se o sistema requer login ──
function _loginRequired(){
  return (A.usuarios||[]).length > 0;
}

// ── Mostra a tela de login ──
function _showLoginScreen(){
  const el = document.getElementById('app-login-screen');

  const hasDefault = (A.usuarios||[]).some(u=>u._senhaDefault);

  if (idEl && lastEmail && !idEl.value) idEl.value = lastEmail;

    const idInput = document.getElementById('login-id');
    const passInput = document.getElementById('login-id-pass');
    if (idInput && idInput.value) {
      passInput?.focus();
    } else if (idInput) {

}

// ── Login ──
async function loginDiag(){
  const out = document.getElementById('login-diag-out');
  out.style.display = 'block';
  out.textContent = '⏳ Calculando...';

  const hash123 = await _sha256('admin123');
  const usuarios = A.usuarios || [];
  const lines = [
    `A.usuarios.length: ${usuarios.length}`,
    `SHA256("admin123"): ${hash123}`,
    `---`,
  ];
  usuarios.forEach((u,i)=>{
    lines.push(`[${i}] login:"${u.login}" papel:"${u.papel}" senhaHash:"${u.senhaHash||'(vazio)'}"`);
    lines.push(`     match: ${(u.senhaHash===hash123)?'✅ SIM':'❌ NÃO'}`);
  });
  if(usuarios.length===0) lines.push('⚠️ Nenhum usuário em A.usuarios!');

  // Checa localStorage
  const dbKey = Object.keys(localStorage).find(k=>k.startsWith('pfp')||k.startsWith('pf_')||k==='db');
  lines.push(`---`);
  lines.push(`localStorage keys: ${Object.keys(localStorage).join(', ')||'(vazio)'}`);
  if(dbKey){
    try{
      const raw = JSON.parse(localStorage.getItem(dbKey));
      lines.push(`DB key: "${dbKey}", usuarios no disco: ${(raw.usuarios||[]).length}`);
    }catch(e){ lines.push(`Erro ao ler DB: ${e}`); }
  }

  out.textContent = lines.join('\n');
}

async function appLogin(){
  // Limpa erro anterior
  const errEl = document.getElementById('login-err');
  if(errEl) errEl.style.display='none';

  const loginVal = (document.getElementById('login-user')?.value||'').trim().toLowerCase();
  const passVal  = (document.getElementById('login-pass')?.value||'');
  const btn      = document.getElementById('login-btn');

  if(!loginVal){ _loginErr('Informe o usuário.'); document.getElementById('login-user')?.focus(); return; }
  if(!passVal){  _loginErr('Informe a senha.');   document.getElementById('login-pass')?.focus(); return; }

  if(btn){ btn.textContent='⏳ Verificando…'; btn.disabled=true; }

  const hash = await _sha256(passVal);
  let user = (A.usuarios||[]).find(u=>
    (u.login||'').toLowerCase()===loginVal && u.senhaHash===hash
  );

  // Se não encontrou e existe um _senhaDefault com login 'admin' + senha 'admin123', corrige o hash
  if(!user && loginVal==='admin'){
    const defAdmin = (A.usuarios||[]).find(u=>u.login==='admin' && u._senhaDefault);
    if(defAdmin){
      defAdmin.senhaHash = hash;
      dbSave();
      user = defAdmin;
    }
  }

  if(btn){ btn.textContent='Entrar'; btn.disabled=false; }

  if(!user){
    await new Promise(r=>setTimeout(r,500));
    _loginErr('Usuário ou senha incorretos.');
    const passEl = document.getElementById('login-pass');
    if(passEl){ passEl.value=''; passEl.focus(); }
    return;
  }

  _hideLoginScreen();
  _sessionSet(user);

  if(user._senhaDefault){
    toast('⚠️ Você está usando a senha padrão. Vá em Senhas → Usuários e altere sua senha!','#D97706',7000);
  } else if(vaultHasMaster() && user.papel==='admin'){
    toast(`👋 Bem-vindo, ${user.nome||user.login}! Acesse Senhas para desbloquear o cofre.`,'#2563EB',4000);
  } else {
    toast(`👋 Bem-vindo, ${user.nome||user.login}!`,'#059669',3000);
  }
  render();
}

function _loginErr(msg){
  const el=document.getElementById('login-err');
  if(el){ el.style.display='block'; el.textContent=msg; }
}

async function appLoginUnified() {
  const errEl = document.getElementById('login-err');
  if (errEl) errEl.style.display = 'none';

  const idVal   = (document.getElementById('login-id')?.value || '').trim();
  const passVal = document.getElementById('login-id-pass')?.value || '';
  const btn     = document.getElementById('login-btn-unified');

  if (!idVal)   { _loginErr('Informe o e-mail ou usuário.'); document.getElementById('login-id')?.focus();       return; }
  if (!passVal) { _loginErr('Informe a senha.');             document.getElementById('login-id-pass')?.focus(); return; }

  if (btn) { btn.textContent = '⏳ Verificando…'; btn.disabled = true; }

  const isEmail = idVal.includes('@');

  // ── Tentativa Firebase (se parece e-mail e Firebase está disponível) ──
  if (isEmail && window._fb) {
    try {
      await window._fb.signIn(idVal, passVal);
      localStorage.setItem('pfp_fb_last_email', idVal);

      // Aguarda o onAuthStateChanged confirmar o usuário (máx 3s)
      if (!window._fbUser) {
        await Promise.race([
          new Promise(r => { const unsub = window._fb.onAuth(u => { if(u){unsub();r(u);} }); }),
          new Promise(r => setTimeout(r, 3000))
        ]);
      }

      const uid   = window._fbUser?.uid || 'fbuser';
      const email = window._fbUser?.email || idVal;

      // Carrega dados do Firebase e mescla se mais recente
      if (btn) { btn.textContent = '⏳ Sincronizando…'; }
      try {
        const data = await window._fb.load(uid);
        if (data) {
          const localTs = new Date(A._savedAt || 0).getTime();
          const cloudTs = new Date(data._savedAt || 0).getTime();
          if (cloudTs > localTs) {
            DB_FIELDS.forEach(k => { if (data[k] !== undefined) A[k] = data[k]; });
            const agora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            window._fbLastSync = `${window._fbEnv==='producao'?'🚀':'🧪'} ☁️ ${agora}`;
          }
        }
      } catch(syncErr) {
        console.warn('Firebase load after login:', syncErr);
      }

      window._fbLoginMode = 'firebase';
      window._appSession = { id: 'fb:' + uid, nome: email.split('@')[0], login: email, papel: 'admin' };
      _sessionSet(window._appSession);
      _updateFbChip('synced');
      _hideLoginScreen();
      toast('☁️ Bem-vindo! Dados sincronizados da nuvem.', '#2563EB', 4000);
      if (btn) { btn.textContent = 'Entrar'; btn.disabled = false; }
      render();
      return;
    } catch(e) {
      // Se não achou no Firebase, tenta local antes de mostrar erro
      const fbMsgs = {
        'auth/invalid-credential': null, // vai tentar local
        'auth/user-not-found':     null,
        'auth/wrong-password':     'Senha incorreta.',
        'auth/invalid-email':      'E-mail inválido.',
        'auth/too-many-requests':  'Muitas tentativas. Aguarde.',
      };
      const fbMsg = fbMsgs[e.code];
      if (fbMsg !== null && fbMsg !== undefined) {
        _loginErr(fbMsg);
        if (btn) { btn.textContent = 'Entrar'; btn.disabled = false; }
        document.getElementById('login-id-pass')?.focus();
        return;
      }
      // Para erros de credencial inválida, cai no local abaixo
    }
  }

  // ── Tentativa local (usuário + hash SHA-256) ──
  const hash = await _sha256(passVal);
  const loginLower = idVal.toLowerCase();
  let user = (A.usuarios || []).find(u =>
    (u.login || '').toLowerCase() === loginLower && u.senhaHash === hash
  );

  // Correção de hash padrão admin
  if (!user && loginLower === 'admin') {
    const defAdmin = (A.usuarios || []).find(u => u.login === 'admin' && u._senhaDefault);
    if (defAdmin) { defAdmin.senhaHash = hash; dbSave(); user = defAdmin; }
  }

  if (btn) { btn.textContent = 'Entrar'; btn.disabled = false; }

  if (!user) {
    await new Promise(r => setTimeout(r, 400));
    _loginErr('E-mail/usuário ou senha incorretos.');
    document.getElementById('login-id-pass').value = '';
    document.getElementById('login-id-pass')?.focus();
    return;
  }

  // Login local: garante que Firebase não reconecte automaticamente
  if (window._fbUser && window._fb) {
    try { await window._fb.signOut(); } catch(e) {}
    window._fbUser = null;
  }
  // Marca sessão como local para bloquear sync automático
  window._fbLoginMode = 'local';

  _hideLoginScreen();
  _sessionSet(user);

  if (user._senhaDefault) {
    toast('⚠️ Você está usando a senha padrão. Vá em Senhas → Usuários e altere sua senha!', '#D97706', 7000);
  } else {
    toast(`👋 Bem-vindo, ${user.nome || user.login}!`, '#059669', 3000);
  }
  render();
}



// ── Login screen tab switching (Entrar / Criar conta) ──
function _loginTabSwitch(tab) {
  const panels = { entrar: document.getElementById('login-panel-entrar'), cadastro: document.getElementById('login-panel-cadastro') };
  const tabs = { entrar: document.getElementById('login-tab-entrar'), cadastro: document.getElementById('login-tab-cadastro') };
  Object.keys(panels).forEach(k => {
    if (panels[k]) panels[k].style.display = k === tab ? 'block' : 'none';
    if (tabs[k]) {
      const active = k === tab;
      tabs[k].style.color = active ? '#2563EB' : 'var(--gray-400)';
      tabs[k].style.borderBottom = active ? '2.5px solid #2563EB' : '2.5px solid transparent';
    }
  });
  ['login-err-fb','login-err-cad','login-err'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  setTimeout(() => {
    const f = tab === 'entrar'
      ? document.getElementById('login-id')
      : document.getElementById('cad-email');
    if (f) f.focus();
  }, 80);
}

// ── Sub-tabs dentro de Entrar: Firebase / Local ──
function _loginSubSwitch(sub) {
  const panels = { firebase: document.getElementById('login-sub-panel-firebase'), local: document.getElementById('login-sub-panel-local') };
  const btns   = { firebase: document.getElementById('login-sub-firebase'),        local: document.getElementById('login-sub-local') };
  Object.keys(panels).forEach(k => {
    if (panels[k]) panels[k].style.display = k === sub ? 'block' : 'none';
    if (btns[k]) {
      const active = k === sub;
      btns[k].style.border = active ? '2px solid #2563EB' : '2px solid transparent';
      btns[k].style.background = active ? '#EFF6FF' : 'transparent';
      btns[k].style.color = active ? '#2563EB' : 'var(--gray-400)';
      btns[k].style.fontWeight = active ? '700' : '600';
    }
  });
  setTimeout(() => {
    const f = sub === 'firebase'
      document.getElementById('login-id');
    if (f) f.focus();
  }, 80);
}

// ── Login Firebase (tela principal) ──
async function appLoginFirebase() {
  const errEl = document.getElementById('login-err-fb');
  if (errEl) errEl.style.display = 'none';
  const email = (document.getElementById('login-fb-email')?.value || '').trim();
  const pass  = document.getElementById('login-fb-pass')?.value || '';
  const btn   = document.getElementById('login-btn-fb');
  if (!email) { _loginErrFb('Informe o e-mail.'); document.getElementById('login-fb-email')?.focus(); return; }
  if (!pass)  { _loginErrFb('Informe a senha.');  document.getElementById('login-fb-pass')?.focus();  return; }
  if (!window._fb) { _loginErrFb('Firebase não inicializado. Recarregue a página.'); return; }
  if (btn) { btn.textContent = '⏳ Verificando…'; btn.disabled = true; }
  try {
    await window._fb.signIn(email, pass);
    localStorage.setItem('pfp_fb_last_email', email);
    _hideLoginScreen();
    await new Promise(r => setTimeout(r, 200));
    toast('☁️ Bem-vindo! Dados sincronizados da nuvem.', '#2563EB', 4000);
    if (!window._appSession) {
      const uid = window._fbUser?.uid || 'fbuser';
      window._appSession = { id: 'fb:' + uid, nome: email.split('@')[0], login: email, papel: 'admin' };
      _sessionSet(window._appSession);
    }
    render();
  } catch(e) {
    const msgs = {
      'auth/invalid-credential': 'E-mail ou senha incorretos.',
      'auth/user-not-found':     'Usuário não encontrado.',
      'auth/wrong-password':     'Senha incorreta.',
      'auth/invalid-email':      'E-mail inválido.',
      'auth/too-many-requests':  'Muitas tentativas. Aguarde alguns minutos.',
    };
    _loginErrFb(msgs[e.code] || 'Erro: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '☁️ Entrar com Firebase'; btn.disabled = false; }
  }
}

// ── Cadastro Firebase (tela principal) ──
async function appRegisterFirebase() {
  const errEl = document.getElementById('login-err-cad');
  if (errEl) errEl.style.display = 'none';
  const email = (document.getElementById('cad-email')?.value || '').trim();
  const pass  = document.getElementById('cad-pass')?.value  || '';
  const pass2 = document.getElementById('cad-pass2')?.value || '';
  const btn   = document.getElementById('login-btn-cad');
  if (!email) { _loginErrCad('Informe o e-mail.'); document.getElementById('cad-email')?.focus(); return; }
  if (!pass)  { _loginErrCad('Informe a senha.');  document.getElementById('cad-pass')?.focus();  return; }
  if (pass.length < 6) { _loginErrCad('A senha deve ter pelo menos 6 caracteres.'); return; }
  if (pass !== pass2)  { _loginErrCad('As senhas não conferem.'); document.getElementById('cad-pass2')?.focus(); return; }
  if (!window._fb) { _loginErrCad('Firebase não inicializado. Recarregue a página.'); return; }
  if (btn) { btn.textContent = '⏳ Criando conta…'; btn.disabled = true; }
  try {
    await window._fb.signUp(email, pass);
    localStorage.setItem('pfp_fb_last_email', email);
    _hideLoginScreen();
    await new Promise(r => setTimeout(r, 200));
    toast('☁️ Conta criada! Dados sincronizando…', '#059669', 4000);
    const uid = window._fbUser?.uid || 'fbuser';
    window._appSession = { id: 'fb:' + uid, nome: email.split('@')[0], login: email, papel: 'admin' };
    _sessionSet(window._appSession);
    dbSave();
    render();
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Este e-mail já está em uso. Tente entrar.',
      'auth/invalid-email':        'E-mail inválido.',
      'auth/weak-password':        'Senha muito fraca (mín. 6 caracteres).',
    };
    _loginErrCad(msgs[e.code] || 'Erro: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '☁️ Criar conta'; btn.disabled = false; }
  }
}

// ── Logout ──
function appLogout(){
  _showConfirm('Sair do sistema?','Sua sessão será encerrada.',async ()=>{
    _sessionClear();
    vaultLock(); // trava o cofre ao fazer logout
    A.cofre={locked:true,masterSet:false,key:null,senhasDecrypt:null};
    // Se estava autenticado via Firebase, deslogar do Firebase também
    if (window._fbUser && window._fb) {
      try { await window._fb.signOut(); } catch(e) {}
      window._fbUser = null;
      _updateFbChip('local');
    }
    _showLoginScreen();
  });
}

// ── Controle de acesso ao cofre por papel ──
// Admin: pode criar senha master, desbloquear, ver tudo
// Usuário/Visitante: só vê o cofre se o admin já desbloqueou nesta sessão
function _canAccessVault(){
  if(!_loginRequired()) return true; // sem usuários = modo livre
  const s=window._appSession;
  if(!s) return false;
  return s.papel==='admin'; // somente admin pode desbloquear o cofre
}

// ── Garante que senhas de usuários sejam hasheadas (migração) ──
// ── Garante que sempre exista pelo menos um admin ──
async function _migrateUserPasswords(){
  let changed=false;
  for(const u of (A.usuarios||[])){
    if(u.senha && !u.senhaHash){
      u.senhaHash = await _sha256(u.senha);
      delete u.senha; // remove texto puro
      changed=true;
    }
  }
  if(changed) dbSave();
}

// ── saveUsuario atualizado para usar hash ──
async function saveUsuarioSecure(){
  const uf=A.usuarioForm;
  if(!uf.nome.trim()){toast('Informe o nome completo.','#DC2626');return;}
  if(!uf.login.trim()){toast('Informe o login/usuário.','#DC2626');return;}
  if(!uf.id&&!uf.senha.trim()){toast('Informe a senha.','#DC2626');return;}
  if(uf.senha&&uf.senha.length<4){toast('A senha deve ter pelo menos 4 caracteres.','#DC2626');return;}
  const loginExiste=(A.usuarios||[]).find(u=>u.login.toLowerCase()===uf.login.toLowerCase()&&u.id!==uf.id);
  if(loginExiste){toast('Já existe um usuário com esse login.','#DC2626');return;}
  if(!A.usuarios)A.usuarios=[];

  // Hasha a senha antes de salvar
  let senhaHash = undefined;
  if(uf.senha) senhaHash = await _sha256(uf.senha);

  if(uf.id){
    const idx=A.usuarios.findIndex(u=>u.id===uf.id);
    if(idx>=0){
      A.usuarios[idx]={...A.usuarios[idx],nome:uf.nome,login:uf.login,papel:uf.papel,obs:uf.obs};
      if(senhaHash){
        A.usuarios[idx].senhaHash=senhaHash;
        delete A.usuarios[idx]._senhaDefault; // remove flag de senha padrão
      }
      delete A.usuarios[idx].senha;
    }
    toast('✅ Usuário atualizado!','#059669');
  } else {
    A.usuarios.push({id:A.nid++,nome:uf.nome,login:uf.login.toLowerCase(),senhaHash,papel:uf.papel,obs:uf.obs,criadoEm:new Date().toISOString().slice(0,10)});
    toast('✅ Usuário criado! Faça login com as novas credenciais.','#059669',4000);
  }
  A.usuarioForm={open:false,id:null,nome:'',login:'',senha:'',papel:'usuario',obs:''};
  dbSave();render();

  // Se o cofre está desbloqueado e o usuário salvo é admin, atualiza as chaves delegadas
  // Precisamos da senha master — ela não está disponível, mas podemos re-registrar via chave atual
  if(!A.cofre.locked && A.cofre.key){
    // Re-registra todos os admins com a chave atual do cofre
    // Cria um verifier temporário para extrair a masterPass — não é possível reverter AES
    // Solução: guardamos a masterPass cifrada na sessionStorage temporariamente (apagada ao fechar aba)
    const storedMasterPass = sessionStorage.getItem('_vmp');
    if(storedMasterPass){
      await _vaultRegisterAdminKeys(storedMasterPass);
      toast('🔑 Chaves de acesso atualizadas para admins.','#2563EB',2500);
    }
  }
}

function toggleDark(){
  const h=document.documentElement;
  const isDark=h.classList.toggle('dark');
  h.classList.toggle('light',!isDark);
  document.getElementById('dk-btn').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('pfp-theme',isDark?'dark':'light');
}
(function initTheme(){
  const saved=localStorage.getItem('pfp-theme');
  const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const dark=saved==='dark'||(saved!=='light'&&prefersDark);
  if(dark){document.documentElement.classList.add('dark');}
  else{document.documentElement.classList.add('light');}
  const btn=document.getElementById('dk-btn');
  if(btn)btn.textContent=dark?'☀️':'🌙';
})();
</script>
