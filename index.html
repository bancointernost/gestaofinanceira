/* ─── PROJEÇÃO ─── */
function rProjecao(m){
  const ano=A.projViewYear;
  const meses=Array.from({length:12},(_,i)=>ano+'-'+String(i+1).padStart(2,'0'));

  // Para cada mês: soma lançamentos reais + planejados + projeção de fixas
  const dados=meses.map(mes=>{
    const txs=A.txs.filter(t=>t.done&&t.date&&t.date.startsWith(mes));
    const recReal=sumT(txs,'receita'),expReal=sumT(txs,'despesa');
    const planTxs=A.txs.filter(t=>t.planned&&!t.done&&t.date&&t.date.startsWith(mes)&&t.type!=='transferencia');
    const recPlan=sumT(planTxs,'receita'),expPlan=sumT(planTxs,'despesa');
    const fixasM=fixasParaMes(mes);
    const recFixa=fixasM.filter(f=>f.type==='receita'&&(!f.pagamentos||!f.pagamentos[mes])).reduce((s,f)=>s+f.val,0);
    const expFixa=fixasM.filter(f=>f.type==='despesa'&&(!f.pagamentos||!f.pagamentos[mes])).reduce((s,f)=>s+f.val,0);
    return{mes,recReal,expReal,recFixa,expFixa,recPlan,expPlan,
      recTotal:recReal+recFixa+recPlan,expTotal:expReal+expFixa+expPlan,
      saldo:(recReal+recFixa+recPlan)-(expReal+expFixa+expPlan),
      fixas:fixasM,txs,planTxs};
  });

  const totalRec=dados.reduce((s,d)=>s+d.recTotal,0);
  const totalExp=dados.reduce((s,d)=>s+d.expTotal,0);
  const melhorMes=dados.reduce((a,b)=>b.saldo>a.saldo?b:a);
  const piorMes=dados.reduce((a,b)=>b.saldo<a.saldo?b:a);

  m.innerHTML=`
  <div class="card">
    <div class="month-nav">
      <button class="nav-btn" onclick="A.projViewYear=${ano-1};render()"><span>‹</span></button>
      <span style="font-size:15px;font-weight:600">${ano}</span>
      <button class="nav-btn" onclick="A.projViewYear=${ano+1};render()"><span>›</span></button>
    </div>
    <div class="row3" style="margin-bottom:12px">
      <div class="stat" onclick="goToLanc('receita')" title="Ver receitas do ano" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(29,158,117,.18)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div class="lbl">Receita anual projetada <span style="font-size:10px;opacity:.55">↗</span></div><div class="val" style="color:#1D9E75">${R(totalRec)}</div></div>
      <div class="stat" onclick="goToLanc('despesa')" title="Ver despesas do ano" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(226,75,74,.18)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div class="lbl">Despesa anual projetada <span style="font-size:10px;opacity:.55">↗</span></div><div class="val" style="color:#E24B4A">${R(totalExp)}</div></div>
      <div class="stat" onclick="goToLanc('all')" title="Ver todos os lançamentos do ano" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(55,138,221,.18)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div class="lbl">Saldo anual projetado <span style="font-size:10px;opacity:.55">↗</span></div><div class="val" style="color:${totalRec-totalExp>=0?'#1D9E75':'#E24B4A'}">${R(totalRec-totalExp)}</div></div>
    </div>
    <div class="row2" style="margin-bottom:12px">
      <div class="stat"><div class="lbl">Melhor mês</div><div class="val" style="color:#1D9E75;font-size:14px">${MNLONG[melhorMes.mes.split('-')[1]]} <span style="font-size:13px">${R(melhorMes.saldo)}</span></div></div>
      <div class="stat"><div class="lbl">Mês mais pesado</div><div class="val" style="color:#E24B4A;font-size:14px">${MNLONG[piorMes.mes.split('-')[1]]} <span style="font-size:13px">${R(piorMes.expTotal)}</span></div></div>
    </div>
    <div style="position:relative;height:200px"><canvas id="projChart"></canvas></div>
  </div>

  <!-- detalhamento por mês -->
  <div class="card">
    <div class="ph"><h3><span>📅</span> Detalhamento por mês</h3>
      <span style="font-size:11px;color:var(--color-text-tertiary)">Clique para expandir</span>
    </div>
    ${dados.map(d=>{
      const[y,mo]=d.mes.split('-');
      const isMes=d.mes===thisMonth();
      const open=A.expandedMonths[d.mes];
      const saldoColor=d.saldo>=0?'#1D9E75':'#E24B4A';
      const saldoClass=d.saldo>=0?'proj-header-saldo-pos':'proj-header-saldo-neg';
      return`<div class="proj-month" style="${isMes?'border-color:#378ADD;border-width:1.5px':''}">
        <div class="proj-header" onclick="A.expandedMonths['${d.mes}']=!A.expandedMonths['${d.mes}'];render()">
          <span class="proj-header-month-name" style="font-size:14px">${MNLONG[mo]}</span>
          ${isMes?`<span class="badge proj-month-mes-badge" style="background:#E6F1FB;color:#0C447C">Mês atual</span>`:''}
          <span class="ph-name"></span>
          <div style="display:flex;gap:12px;align-items:center">
            <span class="proj-header-rec" style="font-size:12px;color:#1D9E75">+${R(d.recTotal)}</span>
            <span class="proj-header-exp" style="font-size:12px;color:#E24B4A">-${R(d.expTotal)}</span>
            <span class="${saldoClass}" style="font-size:13px;font-weight:600;color:${saldoColor}">${R(d.saldo)}</span>
            <span style="font-size:12px;color:var(--color-text-tertiary)">●</span>
          </div>
        </div>
        <div class="proj-body ${open?'open':''}">
          ${d.txs.length===0&&(!d.planTxs||d.planTxs.length===0)&&d.fixas.filter(f=>!f.pagamentos||!f.pagamentos[d.mes]).length===0?'<div class="empty" style="padding:12px">Sem lançamentos ou fixas neste mês</div>':''}
          ${d.txs.length>0?`<div class="proj-section-label" style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">Lançamentos reais</div>
          ${d.txs.map(t=>`<div class="proj-row"><span class="dot" style="background:${catBy(t.catId).color}"></span><span class="pr-name">${H(t.desc)}</span><span class="badge ${t.type==='receita'?'b-ok':'b-exp'}" style="font-size:9px">${t.type==='receita'?'rec':'desp'}</span><span class="pr-val" style="color:${t.type==='receita'?'#1D9E75':'#E24B4A'}">${t.type==='receita'?'+':'-'}${R(t.val)}</span></div>`).join('')}`:''}
          ${d.planTxs&&d.planTxs.length>0?`<div class="proj-section-label proj-section-label-plan" style="font-size:11px;color:#7C3AED;text-transform:uppercase;letter-spacing:.3px;margin:8px 0 4px">📅 Planejados</div>${d.planTxs.map(t=>`<div class="proj-row"><span class="dot" style="background:${catBy(t.catId).color}"></span><span class="pr-name">${H(t.desc)}</span><span class="badge b-rep" style="font-size:9px">planejado</span><span class="pr-val" style="color:${t.type==='receita'?'#1D9E75':'#E24B4A'}">${t.type==='receita'?'+':'-'}${R(t.val)}</span></div>`).join('')}`:''}
          ${d.fixas.filter(f=>!f.pagamentos||!f.pagamentos[d.mes]).length>0?`<div class="proj-section-label" style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.3px;margin:8px 0 4px">Fixas projetadas</div>
          ${d.fixas.filter(f=>!f.pagamentos||!f.pagamentos[d.mes]).map(f=>`<div class="proj-row"><span style="font-size:13px">${f.icon}</span><span class="pr-name">${H(f.desc)} <span style="font-size:10px;color:var(--color-text-tertiary)">dia ${f.diaVenc}</span></span><span class="badge b-pend" style="font-size:9px">projetado</span><span class="pr-val" style="color:${f.type==='receita'?'#1D9E75':'#E24B4A'}">${f.type==='receita'?'+':'-'}${R(f.val)}</span></div>`).join('')}`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  setTimeout(()=>{
    const el=document.getElementById('projChart');if(!el)return;
    A.projChart=new Chart(el,{
      type:'bar',
      data:{
        labels:meses.map(m=>MNSHORT[m.split('-')[1]]),
        datasets:[
          {label:'Receitas',data:dados.map(d=>d.recTotal),backgroundColor:'rgba(29,158,117,0.7)',borderColor:'#1D9E75',borderWidth:1,borderRadius:3},
          {label:'Despesas',data:dados.map(d=>d.expTotal),backgroundColor:'rgba(226,75,74,0.7)',borderColor:'#E24B4A',borderWidth:1,borderRadius:3},
          {label:'Saldo',data:dados.map(d=>d.saldo),type:'line',borderColor:'#378ADD',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:'#378ADD',tension:.3},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+R(c.raw)}}},scales:{y:{ticks:{callback:v=>v>=0?'R$ '+v.toLocaleString('pt-BR'):'- R$ '+Math.abs(v).toLocaleString('pt-BR'),font:{size:10}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{font:{size:11}}}}}
    });
  },60);
}

/* ─── LANÇAMENTOS ─── */
function lancFiltTxs(){
  let txs=filt();
  const ano=String(A.anoFilt);
  // filtro período
  if(A.lancPeriod==='mes'){
    // filtra pelo mês dentro do ano selecionado
    const mesComAno=ano+'-'+A.lancMes.slice(5,7);
    txs=txs.filter(t=>t.date&&t.date.startsWith(mesComAno));
  } else if(A.lancPeriod==='all'){
    // ano todo
    txs=txs.filter(t=>t.date&&t.date.startsWith(ano));
  } else if(A.lancPeriod==='custom'){
    // só filtra quando AMBAS as datas estiverem preenchidas
    if(A.lancDtIni && A.lancDtFim){
      txs=txs.filter(t=>t.date>=A.lancDtIni && t.date<=A.lancDtFim);
    } else {
      txs=[];
    }
  }
  // filtro família
  if(A.lancFamFilt!=='all') txs=txs.filter(t=>t.familia===A.lancFamFilt);
  return [...txs].sort((a,b)=>b.date.localeCompare(a.date));
}
function rLanc(m){
  const txs=lancFiltTxs();
  const tR=sumT(txs,'receita'),tE=sumT(txs,'despesa');
  const ano=A.anoFilt;
  const prevMes=addMonths(A.lancMes,-1),nextMes=addMonths(A.lancMes,1);
  const prevOk=parseInt(prevMes.slice(0,4))===ano;
  const nextOk=parseInt(nextMes.slice(0,4))===ano;
  const[ly,lm]=A.lancMes.split('-');

  const famChips=['all',...famNames()].map(f=>`<button class="fam-chip ${A.lancFamFilt===f?'sel':''}" onclick="A.lancFamFilt='${f}';render()">${f==='all'?'👥 Todos':f}</button>`).join('');

  const periodBar=`
    <div class="period-bar">
      <button class="period-btn ${A.lancPeriod==='mes'?'on':''}" onclick="A.lancPeriod='mes';render()">Mês</button>
      <button class="period-btn ${A.lancPeriod==='all'?'on':''}" onclick="A.lancPeriod='all';render()">Ano todo</button>
      <button class="period-btn ${A.lancPeriod==='custom'?'on':''}" onclick="A.lancPeriod='custom';render()">Período</button>
    </div>
    ${A.lancPeriod==='mes'?`
    <div class="month-nav" style="margin-bottom:0">
      ${prevOk?`<button class="nav-btn" onclick="A.lancMes='${prevMes}';render()"><span>‹</span> ${MNLONG[prevMes.split('-')[1]]}</button>`:`<button class="nav-btn" disabled style="opacity:.3;cursor:default"><span>‹</span></button>`}
      <span>${MNLONG[lm]} ${ano}</span>
      ${nextOk?`<button class="nav-btn" onclick="A.lancMes='${nextMes}';render()"> ${MNLONG[nextMes.split('-')[1]]} <span>›</span></button>`:`<button class="nav-btn" disabled style="opacity:.3;cursor:default"><span>›</span></button>`}
    </div>`:''}
    ${A.lancPeriod==='custom'?`
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:4px 0">
      <input type="date" value="${A.lancDtIni}" onblur="A.lancDtIni=this.value;render()" class="painel-date-input"/>
      <span style="font-size:13px;color:var(--color-text-tertiary)">até</span>
      <input type="date" value="${A.lancDtFim}" onblur="A.lancDtFim=this.value;render()" class="painel-date-input"/>
      ${(!A.lancDtIni||!A.lancDtFim)?`<span style="font-size:12px;color:var(--gray-400)">Selecione as duas datas para filtrar</span>`:''}
    </div>`:''}
  `;

  const grpBar=`<div class="grp-bar">
    <span class="grp-bar-label">Agrupar por:</span>
    <button class="grp-btn ${A.lancGrp==='todos'?'on':''}" onclick="A.lancGrp='todos';render()">Todos</button>
    <button class="grp-btn ${A.lancGrp==='tipo'?'on':''}" onclick="A.lancGrp='tipo';render()">↕ Tipo</button>
    <button class="grp-btn ${A.lancGrp==='categoria'?'on':''}" onclick="A.lancGrp='categoria';render()">🏷 Categoria</button>
    <button class="grp-btn ${A.lancGrp==='conta'?'on':''}" onclick="A.lancGrp='conta';render()">🏦 Conta</button>
    <button class="grp-btn ${A.lancGrp==='familia'?'on':''}" onclick="A.lancGrp='familia';render()">👥 Família</button>
  </div>`;

  // ─── VIEW: TABELA AGRUPADA ───
  function grpTableView(){
    if(txs.length===0) return '<div class="empty">Nenhum lançamento no período</div>';

    const grp=A.lancGrp;

    // Agrupa por tipo como linha mãe, dentro por chave secundária
    const TIPOS=[
      {key:'receita',   label:'Receita',       cls:'receita'},
      {key:'despesa',   label:'Gastos',         cls:'despesa'},
      {key:'transferencia',label:'Transferência',cls:'transferencia'},
    ];

    function keyOf(t){
      if(grp==='tipo') return t.type==='transferencia'?'Transferência':t.type==='receita'?'Receita':'Gasto';
      if(grp==='conta') return t.type==='transferencia'?`${accBy(t.accId).name} → ${accBy(t.accDest).name}`:accBy(t.accId).name;
      if(grp==='familia') return t.familia||'—';
      // data: agrupar por dia
      const dt=new Date(t.date+'T12:00:00');
      return t.date+'|'+['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()]+', '+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
    }
    function keyLabel(k){
      if(grp==='data') return k.split('|')[1]||k;
      return k;
    }
    function keyColor(k,tipo){
      return tipo==='receita'?'#059669':tipo==='despesa'?'#DC2626':'#7C3AED';
    }

    // ─── HELPER: renderiza linhas de lançamentos individuais ───
    function txDetailRows(stxs, expKey){
      const expanded=A.lancGrpExp&&A.lancGrpExp[expKey];
      if(!expanded) return '';
      return stxs.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
        const dt=new Date(t.date+'T12:00:00');
        const dStr=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()]+', '+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
        return`<tr class="grp-tx-row">
          <td colspan="2">${dStr} — ${H(t.desc)}</td>
          <td class="grp-pct"></td>
          <td class="grp-soma">${R(t.val)}</td>
        </tr>`;
      }).join('');
    }

    let totalGeral=0;
    const rows=TIPOS.map(({key,label,cls})=>{
      const tipoTxs=txs.filter(t=>t.type===key);
      if(!tipoTxs.length) return'';
      const tipoTotal=tipoTxs.reduce((s,t)=>s+t.val,0);
      totalGeral+=(key==='despesa'?-1:1)*tipoTotal;

      let subRows='';

      if(grp==='categoria'){
        // ── Agrupamento em árvore por categoria ──
        // Para cada tx, encontra a raiz da categoria
        function getRootCat(catId){
          const c=A.cats.find(x=>x.id==catId);
          if(!c) return {id:'sem',name:'Sem categoria',color:'#888780'};
          if(c.parentId){const p=A.cats.find(x=>x.id==c.parentId);return p||c;}
          return c;
        }
        function getLeafCat(catId){
          const c=A.cats.find(x=>x.id==catId);
          return c||{id:'sem',name:'Sem categoria',color:'#888780'};
        }

        // Agrupa por categoria raiz
        const rootMap={};
        tipoTxs.forEach(t=>{
          const root=getRootCat(t.catId);
          const rid=root.id;
          if(!rootMap[rid]) rootMap[rid]={root,txs:[],subMap:{}};
          rootMap[rid].txs.push(t);
          // Sub-agrupa por categoria folha dentro da raiz
          const leaf=getLeafCat(t.catId);
          const lid=leaf.id;
          if(!rootMap[rid].subMap[lid]) rootMap[rid].subMap[lid]={leaf,txs:[]};
          rootMap[rid].subMap[lid].txs.push(t);
        });

        // Ordena raízes por soma desc
        const rootIds=Object.keys(rootMap).sort((a,b)=>{
          const sa=rootMap[a].txs.reduce((s,t)=>s+t.val,0);
          const sb=rootMap[b].txs.reduce((s,t)=>s+t.val,0);
          return sb-sa;
        });

        subRows=rootIds.map(rid=>{
          const {root,txs:rtxs,subMap}=rootMap[rid];
          const rootSoma=rtxs.reduce((s,t)=>s+t.val,0);
          const rootPct=tipoTotal>0?Math.round(rootSoma/tipoTotal*100):0;
          const rootExpKey=cls+'|root|'+rid;
          const rootExpanded=A.lancGrpExp&&A.lancGrpExp[rootExpKey];

          // Verifica se há subcategorias reais (folhas diferentes da raiz)
          const leafIds=Object.keys(subMap);
          const hasRealSubs=leafIds.some(lid=>parseInt(lid)!==root.id);

          // Sub-linhas: subcategorias ou lançamentos diretos
          let innerRows='';
          if(rootExpanded){
            if(hasRealSubs){
              // Ordena subs por soma desc
              const sortedLeafs=leafIds.sort((a,b)=>{
                const sa=subMap[a].txs.reduce((s,t)=>s+t.val,0);
                const sb=subMap[b].txs.reduce((s,t)=>s+t.val,0);
                return sb-sa;
              });
              innerRows=sortedLeafs.map(lid=>{
                const {leaf,txs:ltxs}=subMap[lid];
                const leafSoma=ltxs.reduce((s,t)=>s+t.val,0);
                const leafPct=rootSoma>0?Math.round(leafSoma/rootSoma*100):0;
                const leafExpKey=cls+'|leaf|'+lid;
                const leafExpanded=A.lancGrpExp&&A.lancGrpExp[leafExpKey];
                const isDirectRoot=(leaf.id===root.id);
                const leafLabel=isDirectRoot?'(direto)':leaf.name;
                const txRows=txDetailRows(ltxs,leafExpKey);
                return`<tr class="grp-cat-row grp-sub-row" onclick="if(!A.lancGrpExp)A.lancGrpExp={};A.lancGrpExp['${leafExpKey}']=!A.lancGrpExp['${leafExpKey}'];render()">
                  <td style="padding-left:32px"><span class="grp-toggle">${leafExpanded?'▼':'▶'}</span><span class="grp-dot" style="background:${root.color};opacity:.7"></span>${H(leafLabel)}</td>
                  <td>${ltxs.length} lançamento${ltxs.length!==1?'s':''}</td>
                  <td class="grp-pct">${leafPct}%</td>
                  <td class="grp-soma">${R(leafSoma)}</td>
                </tr>${txRows}`;
              }).join('');
            } else {
              // Categoria sem filhos: mostra lançamentos diretamente com a mesma chave da raiz
              innerRows=txDetailRows(rtxs,rootExpKey);
            }
          }

          return`<tr class="grp-cat-row" onclick="if(!A.lancGrpExp)A.lancGrpExp={};A.lancGrpExp['${rootExpKey}']=!A.lancGrpExp['${rootExpKey}'];render()">
            <td><span class="grp-toggle">${rootExpanded?'▼':'▶'}</span><span class="grp-dot" style="background:${root.color}"></span>${H(root.name)}</td>
            <td>${rtxs.length} lançamento${rtxs.length!==1?'s':''}</td>
            <td class="grp-pct">${rootPct}%</td>
            <td class="grp-soma">${R(rootSoma)}</td>
          </tr>${innerRows}`;
        }).join('');

      } else {
        // ── Agrupamento padrão (não categoria) ──
        const subMap={};
        tipoTxs.forEach(t=>{const k=keyOf(t);if(!subMap[k])subMap[k]=[];subMap[k].push(t);});
        const subKeys=Object.keys(subMap).sort((a,b)=>subMap[b].reduce((s,t)=>s+t.val,0)-subMap[a].reduce((s,t)=>s+t.val,0));

        subRows=subKeys.map(k=>{
          const stxs=subMap[k];
          const soma=stxs.reduce((s,t)=>s+t.val,0);
          const pct=tipoTotal>0?Math.round(soma/tipoTotal*100):0;
          const col=keyColor(k,key);
          const expKey=cls+'|'+k;
          const expanded=A.lancGrpExp&&A.lancGrpExp[expKey];
          const txSubRows=txDetailRows(stxs,expKey);
          return`<tr class="grp-cat-row" onclick="if(!A.lancGrpExp)A.lancGrpExp={};A.lancGrpExp['${expKey}']=!A.lancGrpExp['${expKey}'];render()">
            <td><span class="grp-toggle">${expanded?'▼':'▶'}</span><span class="grp-dot" style="background:${col}"></span>${keyLabel(k)}</td>
            <td>${stxs.length} lançamento${stxs.length!==1?'s':''}</td>
            <td class="grp-pct">${pct}%</td>
            <td class="grp-soma">${R(soma)}</td>
          </tr>${txSubRows}`;
        }).join('');
      }

      return`<tr class="grp-type-row ${cls}">
          <td colspan="3">${label}</td>
          <td class="grp-type-total">${R(tipoTotal)}</td>
        </tr>
        ${subRows}`;
    }).join('');

    const totalColor=totalGeral>=0?'#059669':'#DC2626';
    const totalSign=totalGeral>=0?'+':'';

    if(_tsc!=='date'){
      const sorted=[...txs].sort(txSortFn(_tsc,_tsd));

    const groups={};txs.forEach(t=>{const k=t.date.slice(0,7);if(!groups[k])groups[k]=[];groups[k].push(t);});

function editFamItem(id){
  const item=famById(id);if(!item)return;

function closeFamForm(){A.famEditOpen=false;A.famEditId=null;A.famForm={name:'',parentId:null};render();}
function saveFamItem(){
  const inp=document.getElementById('fam-name-input');
  const n=(inp?inp.value:A.famForm.name).trim();
  if(!n){toast('Informe o nome.','#E24B4A');return;}
  if(A.famEditId!==null){
    const item=famById(A.famEditId);
    if(item){
      const oldName=item.name;
      item.name=n;
      // Atualiza lançamentos com o nome antigo
      A.txs.forEach(t=>{if(t.familia===oldName)t.familia=n;});
    }
    toast('Atualizado!');
  } else {
    A.familia.push({id:A.nid++,name:n,parentId:A.famForm.parentId||null});
    toast(A.famForm.parentId?'Membro adicionado!':'Grupo adicionado!','#059669');
  }
  closeFamForm();
}
function askDelFamItem(id){
  if(!id)return;
  const item=famById(id);if(!item)return;
  const children=famChildren(id);
  const nTx=A.txs.filter(t=>t.familia===item.name).length;
  const nChildTx=children.reduce((s,c)=>s+A.txs.filter(t=>t.familia===c.name).length,0);
  const total=nTx+nChildTx;
  const childWarn=children.length>0?`<br><span style="color:#D97706">⚠ ${children.length} membro(s) também serão removidos.</span>`:'';
  const txWarn=total>0?`<br><span style="color:#D97706">⚠ ${total} lançamento(s) ficarão sem vínculo.</span>`:'';
  _showConfirm('Remover?',`"<strong>${H(item.name)}</strong>" será removido.${childWarn}${txWarn}`,
    ()=>{
      const ids=new Set([id,...children.map(c=>c.id)]);
      A.familia=A.familia.filter(f=>!ids.has(f.id));
      A.famSelId=null;
      toast('Removido.','#888780');render();
    });
}

function qamCat(stateObj, stateKey, tipo){
  _qam = { type:'cat', stateObj, stateKey, tipo, editId:null,
    form:{ name:'', color:COLORS[0], tipo, parentId:null } };
  _qamRender();
}
function _qamEditCat(id){
  const c=A.cats.find(x=>x.id===id); if(!c)return;
  _qam.editId=id;
  _qam.form={ name:c.name, color:c.color, tipo:c.tipo, parentId:c.parentId||null };
  _qamRender();
}
function _qamSaveCat(){
  const n=(_qam.form.name||'').trim();
  if(!n){toast('Informe o nome.','#E24B4A');return;}
  let selId;
  if(_qam.editId!==null){
    const c=A.cats.find(x=>x.id===_qam.editId);
    if(c){c.name=n;c.color=_qam.form.color;}
    selId=_qam.editId;
    toast('Categoria atualizada!');
  } else {
    const nc={id:A.nid++,name:n,color:_qam.form.color,tipo:_qam.form.tipo,parentId:_qam.form.parentId||null};
    A.cats.push(nc);
    selId=nc.id;
    toast('Categoria criada!','#059669');
  }
  // Aplica seleção no campo de origem
  if(_qam.stateObj==='A.tf') A.tf[_qam.stateKey]=selId;
  else if(_qam.stateObj==='A.ff') A.ff[_qam.stateKey]=selId;
  _qamClose(); render();
}

  let selId;
  if(_qam.editId!==null){
    const a=A.accounts.find(x=>x.id===_qam.editId);
    if(a){a.name=n;a.type=_qam.form.type;a.ini=ini;a.iniDate=_qam.form.iniDate||'';a.iniDateActive=!!_qam.form.iniDateActive;a.obs=_qam.form.obs||'';}
    selId=_qam.editId;
    toast('Conta atualizada!');
  } else {
    const nc={id:A.nid++,name:n,type:_qam.form.type,ini,iniDate:_qam.form.iniDate||'',iniDateActive:false,obs:_qam.form.obs||''};
    A.accounts.push(nc);
    selId=nc.id;
    toast('Conta criada!','#059669');
  }
  if(_qam.stateObj==='A.tf') A.tf[_qam.stateKey]=selId;
  else if(_qam.stateObj==='A.ff') A.ff[_qam.stateKey]=selId;
  _qamClose(); render();
}

// ── Família ──
function qamFam(stateObj, stateKey, mode){
  const curName = (stateObj==='A.tf'?A.tf:A.ff)[stateKey]||'';
  const curItem = A.familia.find(f=>f.name===curName)||null;
  _qam = { type:'fam', stateObj, stateKey, mode,
    editId: mode==='edit'&&curItem ? curItem.id : null,
    form:{ name: mode==='edit'&&curItem ? curItem.name : '', parentId: mode==='edit'&&curItem ? curItem.parentId||null : null }
  };
  _qamRender();
}
function _qamSaveFam(){
  const n=(_qam.form.name||'').trim();
  if(!n){toast('Informe o nome.','#E24B4A');return;}
  let selName;
  if(_qam.editId!==null){
    const item=famById(_qam.editId);
    if(item){
      const old=item.name; item.name=n;
      A.txs.forEach(t=>{if(t.familia===old)t.familia=n;});
    }
    selName=n;
    toast('Membro atualizado!');
  } else {
    A.familia.push({id:A.nid++,name:n,parentId:_qam.form.parentId||null});
    selName=n;
    toast('Membro adicionado!','#059669');
  }
  if(_qam.stateObj==='A.tf') A.tf[_qam.stateKey]=selName;
  else if(_qam.stateObj==='A.ff') A.ff[_qam.stateKey]=selName;
  _qamClose(); render();
}

function askDel(id){

    _showConfirm(
      'Desfazer lançamento?',

      ()=>{t.done=false;A.delId=null;toast('Reativado no planejamento.','#888780');render();}
    );
  } else {
    // Verifica se é lançamento gerado por conta fixa

      _showConfirm(

        ()=>{

          delete fixaOwner.pagamentos[fixaMes];

function agendList(){
  // aplica filtro
  let pend=A.txs.filter(t=>!t.done);
  if(A.planPeriod==='mes'){
    pend=pend.filter(t=>t.date.startsWith(A.planMes));
  } else if(A.planPeriod==='custom'&&A.planDtIni&&A.planDtFim){
    pend=pend.filter(t=>t.date>=A.planDtIni&&t.date<=A.planDtFim);
  }
  pend=pend.sort((a,b)=>a.date.localeCompare(b.date));

  const pendAll=A.txs.filter(t=>!t.done);
  const tR=pendAll.filter(t=>t.type==='receita').reduce((s,t)=>s+t.val,0);
  const tE=pendAll.filter(t=>t.type==='despesa').reduce((s,t)=>s+t.val,0);

  const prevMes=addMonths(A.planMes,-1),nextMes=addMonths(A.planMes,1);
  const[ly,lm]=A.planMes.split('-');

  const periodBar=`
    <div class="period-bar">
      <button class="period-btn ${A.planPeriod==='mes'?'on':''}" onclick="A.planPeriod='mes';render()">Mês</button>

      <button class="period-btn ${A.planPeriod==='custom'?'on':''}" onclick="A.planPeriod='custom';render()">Período</button>
    </div>
    ${A.planPeriod==='mes'?`
    <div class="month-nav" style="margin-bottom:0">
      <button class="nav-btn" onclick="A.planMes='${prevMes}';render()"><span>‹</span> ${MNLONG[prevMes.split('-')[1]]}</button>
      <span>${MNLONG[lm]} ${ly}</span>
      <button class="nav-btn" onclick="A.planMes='${nextMes}';render()">${MNLONG[nextMes.split('-')[1]]} <span>›</span></button>
    </div>`:''}
    ${A.planPeriod==='custom'?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:4px 0">
      <input type="date" value="${A.planDtIni}" oninput="A.planDtIni=this.value;render()" class="painel-date-input"/>
      <span style="font-size:13px;color:var(--color-text-tertiary)">até</span>
      <input type="date" value="${A.planDtFim}" oninput="A.planDtFim=this.value;render()" class="painel-date-input"/>
    </div>`:''}`;

  // agrupar por mês
  const groups={};
  pend.forEach(t=>{const k=t.date.slice(0,7);if(!groups[k])groups[k]=[];groups[k].push(t);});

  const groupHtml=Object.keys(groups).sort().map(k=>{
    const[y,mo]=k.split('-');
    const mR=sumT(groups[k],'receita'),mE=sumT(groups[k],'despesa');
    const byDay={};groups[k].forEach(t=>{if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t);});
    let planRowIdx=0;
    const dayRows=Object.keys(byDay).sort().map(d=>{
      return`<div class="tx-day-block">
        <div class="tx-list">${(()=>{return byDay[d].map(t=>iRowPlan(t,planRowIdx++));})().join('')}</div>
      </div>`;
    }).join('');
    return`<div class="tx-group">
      <div class="tx-list" style="width:100%;margin-bottom:0"><div class="tx-col-header"><div class="tx-ch tx-ch-icon"></div><div class="tx-ch tx-ch-main">Descrição</div><div class="tx-ch tx-ch-acc">Conta</div><div class="tx-ch tx-ch-cat">Categoria</div><div class="tx-ch tx-ch-val">Valor</div><div class="tx-ch tx-ch-date">Data</div><div class="tx-ch tx-ch-actions"></div></div></div>
      ${dayRows}
    </div>`;
  }).join('');

  // lançados no período (planned=true, done=true)
  let launched=A.txs.filter(t=>t.planned&&t.done);
  if(A.planPeriod==='mes'){
    launched=launched.filter(t=>t.date&&t.date.startsWith(A.planMes));
  } else if(A.planPeriod==='custom'&&A.planDtIni&&A.planDtFim){
    launched=launched.filter(t=>t.date&&t.date>=A.planDtIni&&t.date<=A.planDtFim);
  }
  launched=launched.sort((a,b)=>a.date.localeCompare(b.date));
  const launchedHtml=launched.length>0?`
    <div style="margin-top:14px">
      <div class="sl" style="margin-bottom:8px"><span style="color:#059669">✓ Lançados (${launched.length})</span></div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${launched.map(t=>{
          const cat=catBy(t.catId);
          const vc=t.type==='receita'?'#059669':'#DC2626';
          const pf=t.type==='receita'?'+':'−';
          const bgIc=t.type==='receita'?'#D1FAE5':'#FEE2E2';
          const borderL=t.type==='receita'?'#059669':'#DC2626';
          const arrow=t.type==='receita'?'↑':'↓';
          const catDot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0;margin-right:4px"></span>`;
          const dt=new Date(t.date+'T12:00:00');
          const dd=String(dt.getDate()).padStart(2,'0');
          const mm=String(dt.getMonth()+1).padStart(2,'0');
          return`<div class="tx-card" style="border-left:3px solid ${borderL};opacity:.8">
            <div class="tx-icon" style="background:${bgIc};color:${borderL};font-size:20px;font-weight:700">${arrow}</div>
            <div class="tx-body">
              <div class="tx-desc" style="text-decoration:line-through;color:var(--gray-400)">${H(t.desc)}</div>
              <div class="tx-chips">${catDot}<span class="tx-cat-name">${cat.name}</span><span class="tx-dot-sep"> · </span><span class="tx-acc-name">${accBy(t.accId).name}</span><span class="tx-dot-sep"> · </span><span style="font-size:11px;color:var(--gray-400)">${dd}/${mm}</span></div>
            </div>
            <div class="tx-right">
              <div class="tx-val" style="color:${vc}">${pf}${R(t.val)}</div>
              <span class="badge b-ok" style="font-size:10px">Lançado</span>
            </div>
            <div style="flex-shrink:0">
              <button onclick="desfazerLancamento(${t.id})" title="Desfazer lançamento"
                style="display:flex;align-items:center;gap:4px;padding:5px 9px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-600);font-family:inherit">
                <span>↩</span> Desfazer
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:'';

  return`
  ${periodBar}
  ${pend.length===0?'<div class="empty" style="margin-top:12px">Nenhum agendamento pendente no período</div>':groupHtml}
  ${launchedHtml}`;
}

function clrPlan(){A.planFormOpen=false;A.txId=null;A.ctpExp={};A.tf={type:'despesa',desc:'',val:'',date:today(),catId:null,accId:null,accDest:null,recur:'none',obs:'',familia:'',parcelas:1};render();}
function editPlan(id){const t=A.txs.find(x=>x.id===id);if(!t)return;A.planFormOpen=true;A.txId=id;A.ctpExp={};A.tf={type:t.type,desc:t.desc,val:t.val,date:t.date,catId:t.catId||A.cats[0]?.id||1,accId:t.accId,accDest:t.accDest||(A.accounts[1]?.id||1),recur:t.recur||'none',obs:t.obs||'',familia:t.familia||'',parcelas:1};render();}
function savePlan(){
  const f=A.tf;
  if(!f.desc.trim()||!f.val||parseFloat(f.val)<=0||!f.date){toast('Preencha descrição, valor e data.','#E24B4A');return;}
  const parcelas=parseInt(f.parcelas)||1;
  const valTotal=parseFloat(f.val);
  const valParc=parseFloat((valTotal/parcelas).toFixed(2));
  // Edição simples (sem parcelamento)
  if(typeof A.txId==='number'){
    const i=A.txs.findIndex(t=>t.id===A.txId);
    if(i!==-1)A.txs[i]={...A.txs[i],...f,val:valTotal,parcelas:undefined};
    toast('Atualizado!');clrPlan();return;
  }
  if(parcelas<=1&&f.recur!=='none'){
    // Gera ocorrências futuras conforme periodicidade
    const limits={semanal:8,mensal:12,anual:3};
    const n=limits[f.recur]||12;
    const baseDate=f.date;
    for(let i=0;i<n;i++){
      let d;
      if(f.recur==='semanal'){
        const dt=new Date(baseDate+'T12:00:00');
        dt.setDate(dt.getDate()+i*7);
        d=dt.toISOString().slice(0,10);
      } else if(f.recur==='mensal'){
        const mes=addMonths(baseDate.slice(0,7),i);
        d=`${mes}-${baseDate.slice(8,10)}`;
      } else if(f.recur==='anual'){
        const y=parseInt(baseDate.slice(0,4))+i;
        d=`${y}${baseDate.slice(4)}`;
      }
      A.txs.push({id:A.nid++,...f,val:valTotal,date:d,planned:true,done:false,parcelas:undefined});
    }
    const labels={semanal:`${n} semanas`,mensal:`${n} meses`,anual:`${n} anos`};
    toast(`${n} ocorrências agendadas (${labels[f.recur]})!`,'#378ADD');
  } else if(parcelas<=1){
    A.txs.push({id:A.nid++,...f,val:valTotal,planned:true,done:false,parcelas:undefined});
    toast('Agendado!');
  } else {
    for(let i=0;i<parcelas;i++){
      const mes=addMonths(f.date.slice(0,7),i);
      const dia=f.date.slice(8,10);
      A.txs.push({id:A.nid++,...f,val:valParc,date:`${mes}-${dia}`,desc:`${f.desc} (${i+1}/${parcelas})`,planned:true,done:false,parcelas:undefined});
    }
    toast(`${parcelas}x de ${R(valParc)} agendadas!`,'#378ADD');
  }
  closePlanForm();
}

function askDelCat(id){

  const subWarn=subs.length>0?`<br><span style="color:#D97706">⚠ ${subs.length} subcategoria(s) também serão apagadas.</span>`:'';

    `"<strong>${H(cat?.name)}</strong>" será removida permanentemente.${subWarn}`,
    ()=>{

      toast('Removida.','#888780');render();
    });
}

let _confirmCallback=null;
function _showConfirm(title,msg,onOk,opts){
  opts=opts||{};
  const overlay=document.getElementById('confirmOverlay');
  const titleEl=document.getElementById('confirmTitle');
  const msgEl=document.getElementById('confirmMsg');
  const okBtn=document.getElementById('confirmOkBtn');
  titleEl.textContent=title;
  msgEl.innerHTML=msg;
  okBtn.textContent=opts.okLabel||'Excluir';
  okBtn.style.background=opts.okColor||'#DC2626';
  // Se não há callback de confirmação real (ex: apenas info), esconde botão excluir
  if(!onOk){
    okBtn.style.display='none';
    // o cancelar vira "OK"
    overlay.querySelector('.cd-actions button:first-child').textContent='OK';
  } else {
    okBtn.style.display='';
    overlay.querySelector('.cd-actions button:first-child').textContent='Cancelar';
  }
  _confirmCallback=onOk;
  overlay.style.display='flex';
  document.body.style.overflow='hidden';
}
// Guarda para fechar modal apenas quando o clique COMEÇOU no overlay
// (evita fechar ao soltar o mouse fora após selecionar texto dentro do modal)
let _overlayMousedownTarget = null;
function _overlayMousedown(e){ _overlayMousedownTarget = e.target; }
function _overlayClick(e, closeFn){
  if(_overlayMousedownTarget === e.currentTarget && e.target === e.currentTarget){ closeFn(); }
  _overlayMousedownTarget = null;
}
function _confirmCancel(){
  const overlay=document.getElementById('confirmOverlay');
  overlay.style.display='none';
  document.body.style.overflow='';
  _confirmCallback=null;
}
function _confirmOk(){
  const cb=_confirmCallback;
  _confirmCancel();
  if(cb)cb();
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')_confirmCancel();});

const DB_KEY        = 'pfp_v11_data';    // chave localStorage
const OPFS_FILE     = 'pfp_data.json';   // arquivo OPFS
const FS_HANDLE_KEY = 'pfp_storage_mode'; // 'disk' | 'opfs' | 'local'

// Campos do estado A que devem ser persistidos
const DB_FIELDS = ['nid','familia','cats','accounts','fixas','txs','senhas','usuarios'];

// ── Detecção de suporte ──
const _opfsOk = typeof navigator !== 'undefined' &&
                typeof navigator.storage !== 'undefined' &&
                typeof navigator.storage.getDirectory === 'function';
const _fsaOk = typeof window !== 'undefined' && typeof window.showOpenFilePicker === 'function';

// ── Modo de armazenamento ──
// 'disk'  = File System Access API (arquivo real escolhido pelo usuário)
// 'opfs'  = Origin Private File System (padrão quando disponível)
// 'local' = localStorage (fallback)
localStorage.removeItem(FS_HANDLE_KEY);
let _storageMode = _opfsOk ? 'opfs' : 'local'; // nunca 'disk' — sem pedido de arquivo local

// ── Handle do arquivo em disco (File System Access API) ──
let _diskFileHandle = null;

// Tenta restaurar o handle do arquivo em disco via IndexedDB
const _idbName = 'pfp_fs_handles';
const _idbStore = 'handles';

async function _idbGet(key) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open(_idbName, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(_idbStore);
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction(_idbStore, 'readonly');
        const r = tx.objectStore(_idbStore).get(key);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror = () => resolve(null);
      };
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

async function _idbSet(key, value) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open(_idbName, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(_idbStore);
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction(_idbStore, 'readwrite');
        tx.objectStore(_idbStore).put(value, key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      };
      req.onerror = () => resolve(false);
    } catch(e) { resolve(false); }
  });
}

async function _idbDel(key) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open(_idbName, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(_idbStore);
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction(_idbStore, 'readwrite');
        tx.objectStore(_idbStore).delete(key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      };
      req.onerror = () => resolve(false);
    } catch(e) { resolve(false); }
  });
}

// Flag: handle existe mas aguarda clique do usuário para requestPermission
let _pendingPermissionHandle = null;

// Restaura handle do arquivo em disco ao iniciar
async function _restoreDiskHandle() {
  if (!_fsaOk) return false;
  const handle = await _idbGet('diskFileHandle');
  if (!handle) return false;
  try {
    // Verifica permissão sem prompt (queryPermission)
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      _diskFileHandle = handle;
      return true;
    }
    // Permissão não garantida mas handle existe — guarda para reauth via banner
    _pendingPermissionHandle = handle;
    _diskFileHandle = handle; // guarda para uso após permissão
    return false; // precisará de requestPermission no próximo write/read
  } catch(e) {
    return false;
  }
}

async function _ensureDiskPermission() {
  if (!_diskFileHandle) return false;
  try {
    let perm = await _diskFileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      perm = await _diskFileHandle.requestPermission({ mode: 'readwrite' });
    }
    return perm === 'granted';
  } catch(e) {
    return false;
  }
}

// ── Escrita no arquivo em disco ──
async function _diskWrite(text) {
  if (!_diskFileHandle) throw new Error('Sem arquivo em disco configurado');
  const ok = await _ensureDiskPermission();
  if (!ok) throw new Error('Permissão negada para o arquivo');
  const writable = await _diskFileHandle.createWritable();
  await writable.write(text);
  await writable.close();
}

async function _diskRead() {
  if (!_diskFileHandle) return null;
  try {
    const ok = await _ensureDiskPermission();
    if (!ok) return null;
    const file = await _diskFileHandle.getFile();
    return await file.text();
  } catch(e) {
    return null;
  }
}

// ── Handle OPFS reutilizável ──
let _opfsHandle = null;
async function _getOpfsHandle() {
  if (_opfsHandle) return _opfsHandle;
  const root = await navigator.storage.getDirectory();
  _opfsHandle = await root.getFileHandle(OPFS_FILE, { create: true });
  return _opfsHandle;
}

// ── Escrita atômica via createSyncAccessHandle (Worker) ou writable stream ──
async function _opfsWrite(text) {
  const handle = await _getOpfsHandle();
  const writable = await handle.createWritable();
  await writable.write(text);
  await writable.close();
}

async function _opfsRead() {
  try {
    const handle = await _getOpfsHandle();
    const file = await handle.getFile();
    return await file.text();
  } catch(e) {
    return null;
  }
}

// ── Estimativa de uso ──
async function _storageUsageKB() {
  if (_opfsOk && navigator.storage.estimate) {
    try {
      const est = await navigator.storage.estimate();
      return Math.round((est.usage || 0) / 1024);
    } catch(e) {}
  }
  // fallback localStorage
  let total = 0;
  for (const key in localStorage) {
    if (!localStorage.hasOwnProperty(key)) continue;
    total += (localStorage[key].length + key.length) * 2;
  }
  return Math.round(total / 1024);
}

// Armazena último valor para exibição síncrona na status bar
let _lastUsageKB = 0;
function _lsUsageKB() { return _lastUsageKB; }

// ── dbSave: Disco / OPFS / localStorage ──
function dbSave() {
  const payload = {};
  DB_FIELDS.forEach(k => { payload[k] = A[k]; });
  payload._savedAt = new Date().toISOString();
  const serialized = JSON.stringify(payload);

  if (_storageMode === 'disk' && _diskFileHandle) {
    // Modo disco: salva no arquivo escolhido pelo usuário
    _diskWrite(serialized).catch(e => {
      console.error('Disk write error:', e);
      // Se perdeu permissão, tenta pedir novamente na próxima interação
      if (e.message && e.message.includes('permissão')) {
        toast('⚠️ Permissão negada para o arquivo. Clique em ⚙️ para reautorizar.', '#D97706', 5000);
      } else {
        toast('Erro ao salvar no arquivo em disco.', '#DC2626');
      }
    });
    // Espelho no localStorage para carregamento rápido
    try { localStorage.setItem(DB_KEY, serialized); } catch(e) {}
    if (_opfsOk) {
      _opfsWrite(serialized).catch(() => {});
    }
  } else if (_opfsOk) {
    _opfsWrite(serialized).catch(e => {
      console.warn('OPFS write error (silenciado):', e);
    });
    // Espelho leve no localStorage para leitura síncrona inicial (comprimido)
    try { localStorage.setItem(DB_KEY, serialized); } catch(e) { /* ignora quota */ }
  } else {
    // Fallback puro localStorage
    try {
      const kb = (serialized.length * 2) / 1024;
      if (kb > 4096) toast('⚠️ Armazenamento quase cheio! Faça um backup.', '#D97706', 5000);
      localStorage.setItem(DB_KEY, serialized);
    } catch(e) {
      if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
        toast('🚨 Armazenamento cheio! Exporte um backup imediatamente.', '#DC2626', 8000);
        const dbBar = document.getElementById('db-bar');
        if (dbBar) {
          const exportBtn = dbBar.querySelector('button');
          if (exportBtn) {
            exportBtn.style.background = '#FEF2F2';
            exportBtn.style.borderColor = '#F87171';
            exportBtn.style.color = '#DC2626';
          }
        }
      } else {
        toast('Erro inesperado ao salvar.', '#DC2626');
      }
    }
  }

  // Atualiza estimativa de uso em background
  _storageUsageKB().then(kb => { _lastUsageKB = kb; _updateDbStatus(); });

  // ── Firebase: sincroniza automaticamente se logado ──
  if (window._fbUser && window._fb) {
    clearTimeout(window._fbSyncTimer);
    window._fbSyncTimer = setTimeout(() => {
      const fbPayload = {};
      DB_FIELDS.forEach(k => { fbPayload[k] = A[k]; });
      fbPayload._savedAt = new Date().toISOString();
      _updateFbChip('syncing');
      window._fb.save(window._fbUser.uid, fbPayload)
        .then(() => {
          const agora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
          const env = window._fbEnv === 'producao' ? '🚀' : '🧪';
          window._fbLastSync = `${env} ☁️ ${agora}`;
          window._fbSyncError = false;
          _updateDbStatus();
          _updateFbChip('synced');
        })
        .catch(e => { console.warn('Firebase auto-sync error:', e); window._fbSyncError = true; _updateFbChip('error'); });
    }, 2000); // debounce 2s para não disparar a cada tecla
  }
}

// ── dbLoad: Disco / OPFS / localStorage ──
// ── SHA-256 via WebCrypto (definida cedo — usada no boot) ──
async function _sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Garante admin padrão (definida cedo — usada no boot) ──
async function _ensureDefaultAdmin(){
  const senhaHash = await _sha256('admin123');

  if(!A.usuarios || A.usuarios.length === 0){
    if(!A.usuarios) A.usuarios = [];
    A.usuarios.push({
      id: A.nid++,
      nome: 'Administrador',
      login: 'admin',
      senhaHash,
      papel: 'admin',
      obs: 'Usuário padrão. Altere a senha após o primeiro acesso.',
      criadoEm: new Date().toISOString().slice(0,10),
      _senhaDefault: true
    });
    return;
  }

  // Corrige hash do admin padrão se estiver desatualizado (migração de versão)
  const adminDefault = A.usuarios.find(u => u.login === 'admin' && u._senhaDefault);
  if(adminDefault && adminDefault.senhaHash !== senhaHash){
    adminDefault.senhaHash = senhaHash;
  }
}

async function dbLoadAsync() {
  let raw = null;

  if (_storageMode === 'disk' && _diskFileHandle) {
    raw = await _diskRead();
  }

  if (!raw && _opfsOk) {
    raw = await _opfsRead();
  }

  if (!raw) {
    // Fallback síncrono legacy
    try { raw = localStorage.getItem(DB_KEY); } catch(e) {}
  }
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    DB_FIELDS.forEach(k => { if (data[k] !== undefined) A[k] = data[k]; });
    // Garante admin padrão mesmo após carregar dados do Firebase
    await _ensureDefaultAdmin();
    return true;
  } catch(e) {
    console.error('Erro ao carregar dados:', e);
    return false;
  }
}

function dbClear() {
  if (!confirm('⚠️ Tem certeza que deseja apagar TODOS os dados salvos?\nEsta ação não pode ser desfeita.')) return;
  localStorage.removeItem(DB_KEY);
  if (_opfsOk) {
    navigator.storage.getDirectory().then(root => {
      root.removeEntry(OPFS_FILE).catch(()=>{});
    }).catch(()=>{});
  }
  _opfsHandle = null;
  // Limpa arquivo em disco também
  if (_storageMode === 'disk' && _diskFileHandle) {
    _diskWrite('{}').catch(()=>{});
  }
  location.reload();
}

// Intercepta o render original para auto-salvar após cada operação
const _render = render;
window.render = function() {
  if (!window._bootDone) return; // aguarda o boot completar
  _render.apply(this, arguments);
  dbSave();
  _updateDbStatus();
};

function _updateDbStatus() {
  const el = document.getElementById('db-status');
  if (!el) return;
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) { el.textContent = '⚫ Sem dados'; return; }
    const data = JSON.parse(raw);
    const txCount = (data.txs||[]).length;
    const accCount = (data.accounts||[]).length;
    const d = new Date(data._savedAt);
    const hm = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const usageKB = _lsUsageKB();
    const usageStr = usageKB > 1024
      ? (usageKB / 1024).toFixed(1) + ' MB'
      : usageKB > 0 ? usageKB + ' KB' : '…';

    let storageLabel;
    if (_storageMode === 'disk' && _diskFileHandle) {
      storageLabel = `<span style="color:#059669;font-weight:600" title="Salvando em arquivo no disco: ${_diskFileHandle.name}">📂 ${_diskFileHandle.name}</span>`;
    } else if (_opfsOk) {
      storageLabel = `<span style="color:#7C3AED;font-weight:600" title="Armazenamento fora do navegador (OPFS) — sem limite de 5 MB">💾 OPFS</span>`;
    } else {
      storageLabel = `<span style="color:#6B7280" title="localStorage — limite ~5 MB">${usageStr}/5 MB</span>`;
    }
    const fbLabel = window._fbUser
      ? `&nbsp;·&nbsp;<span style="color:#2563EB;font-weight:600" title="Sincronizado com Firebase">☁️ ${window._fbUser.email}</span>`
      : '';
    const fbSync = window._fbLastSync
      ? `&nbsp;·&nbsp;<span style="color:#059669;font-weight:600" title="Última sincronização Firebase">${window._fbLastSync}</span>`
      : '';
    el.innerHTML = `<span style="color:#1D9E75">●</span> Salvo ${hm} &nbsp;·&nbsp; ${txCount} lanç. &nbsp;·&nbsp; ${accCount} contas &nbsp;·&nbsp; ${storageLabel}${fbLabel}${fbSync}`;
  } catch(e) {
    el.textContent = '';
  }
}

function _updateFbChip(state) {
  // state: 'local' | 'syncing' | 'synced' | 'error'
  const dot = document.getElementById('fb-status-dot');
  const lbl = document.getElementById('fb-status-label');
  const chip = document.getElementById('fb-status-chip');
  if (!dot || !lbl || !chip) return;
  const user = window._fbUser;
  const isDark = document.documentElement.classList.contains('dark');
  const configs = {
    local:   { dot: '#94A3B8', bg: isDark ? '#1a2235' : '#F1F5F9', border: isDark ? '#2e3d55' : '#E2E8F0', text: isDark ? '#8a9db5' : '#64748B', label: 'Local' },
    syncing: { dot: '#F59E0B', bg: isDark ? '#291500' : '#FFFBEB', border: isDark ? '#78350F' : '#FDE68A', text: isDark ? '#FCD34D' : '#92400E', label: 'Sync...' },
    synced:  { dot: '#10B981', bg: isDark ? '#064E3B' : '#ECFDF5', border: isDark ? '#065F46' : '#A7F3D0', text: isDark ? '#34D399' : '#065F46', label: user ? user.email.split('@')[0] : 'Sync' },
    error:   { dot: '#EF4444', bg: isDark ? '#2D0A0A' : '#FEF2F2', border: isDark ? '#7F1D1D' : '#FECACA', text: isDark ? '#F87171' : '#991B1B', label: 'Erro' },
  };
  const c = configs[state] || configs.local;
  dot.style.background = c.dot;
  chip.style.background = c.bg;
  chip.style.borderColor = c.border;
  lbl.style.color = c.text;
  lbl.textContent = c.label;
  // Tooltip com info de último sync
  const lastSync = window._fbLastSync ? `Último sync: ${window._fbLastSync.replace(/[🚀🧪☁️]/g,'').trim()}` : (user ? 'Conectado — aguardando sync' : 'Sem conexão cloud');
  chip.title = lastSync;
  // Se synced, volta para 'synced' estático após 3s sem novo estado
  if (state === 'synced') {

  }
}

function _onFbAuthChange(user) {
  // Se o modo de login atual é local, ignorar reconexão automática do Firebase
  if (window._fbLoginMode === 'local' && user) {
    console.log('Firebase auth ignorado: modo local ativo. Fazendo signOut silencioso.');
    if (window._fb) window._fb.signOut().catch(() => {});
    window._fbUser = null;
    _updateFbChip('local');
    return;
  }

  window._fbUser = user || null;
  const btn = document.getElementById('fb-btn-label');
  const envBadge = '🚀';
  if (btn) btn.textContent = user ? `${envBadge} ${user.email.split('@')[0]}` : `${envBadge} Nuvem`;
  // Atualiza chip no topbar
  _updateFbChip(user ? 'synced' : 'local');
  // Resolve a promise do boot na primeira vez que o Firebase responde
  if (typeof window._fbAuthReadyResolve === 'function') {
    window._fbAuthReadyResolve(user);
    window._fbAuthReadyResolve = null;
  }
  // Após o boot: atualiza status
  if (window._bootDone) {
    _updateDbStatus();
  }
}

// ── Login/troca de conta a partir do modal ──
async function _fbSwitchLogin() {
  const email = (document.getElementById('fb-sw-email')?.value || '').trim();
  const pass  = document.getElementById('fb-sw-pass')?.value || '';
  const errEl = document.getElementById('fb-sw-err');
  const btn   = document.getElementById('fb-sw-btn');
  if (errEl) errEl.style.display = 'none';
  if (!email || !pass) { if(errEl){errEl.style.display='block';errEl.textContent='Preencha e-mail e senha.';} return; }
  if (btn) { btn.textContent = '⏳ Conectando…'; btn.disabled = true; }
  try {
    // Faz logout da conta atual se houver
    if (window._fbUser && window._fb) { try { await window._fb.signOut(); } catch(e){} }
    await window._fb.signIn(email, pass);
    localStorage.setItem('pfp_fb_last_email', email);
    // Aguarda onAuthStateChanged confirmar
    if (!window._fbUser) {
      await Promise.race([
        new Promise(r => { const u = window._fb.onAuth(usr => { if(usr){u();r(usr);} }); }),
        new Promise(r => setTimeout(r, 3000))
      ]);
    }
    const uid   = window._fbUser?.uid || 'fbuser';
    const eml   = window._fbUser?.email || email;

    // Limpa os dados em memória (que ainda pertencem à conta anterior) ANTES
    // de buscar os dados reais da conta recém-logada. Isso evita que os dados
    // do usuário antigo sejam exibidos e, principalmente, sobrescrevam por
    // engano os dados na nuvem do novo usuário.
    _resetAppDataToSeed();
    try {
      const data = await window._fb.load(uid);
      if (data) {
        DB_FIELDS.forEach(k => { if (data[k] !== undefined) A[k] = data[k]; });
      }
    } catch(loadErr) {
      console.warn('Erro ao carregar dados da conta trocada:', loadErr);
    }

    window._appSession = { id: 'fb:' + uid, nome: eml.split('@')[0], login: eml, papel: 'admin' };
    _sessionSet(window._appSession);
    _updateFbChip('synced');
    document.getElementById('fb-modal-overlay')?.remove();

async function fbPush() {
  // "Salvar local" = exporta os dados para arquivo no computador do usuário
  const btn = document.querySelector('#fb-modal-overlay button[onclick="fbPush()"]');
  if (btn) { btn.textContent = '⏳ Salvando…'; btn.disabled = true; }

  const suggestedName = 'financas_' + new Date().toISOString().slice(0, 10) + '.json';
  const payload = {};
  DB_FIELDS.forEach(k => { payload[k] = A[k]; });
  payload._savedAt = new Date().toISOString();
  const json = JSON.stringify(payload, null, 2);

  try {
    // Abre o seletor nativo "Salvar como" se disponível
    if (window.showSaveFilePicker) {
      const fileHandle = await window.showSaveFilePicker({
        suggestedName,
        types: [{ description: 'Arquivo de dados JSON', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await fileHandle.createWritable();
      await writable.write(json);
      await writable.close();
      document.getElementById('fb-modal-overlay')?.remove();
      toast('💾 Arquivo salvo: ' + fileHandle.name, '#059669', 4000);
    } else {
      // Fallback: download direto pelo browser
      const blob = new Blob([json], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = suggestedName;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
      document.getElementById('fb-modal-overlay')?.remove();
      toast('💾 Download iniciado: ' + suggestedName, '#059669', 4000);
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      // Usuário cancelou o seletor — silencioso
    } else {
      console.error('fbPush (salvar local) error:', e);
      toast('Erro ao salvar arquivo: ' + (e.message || 'erro desconhecido'), '#DC2626', 5000);
    }
    if (btn) { btn.textContent = '⬆️ Salvar local'; btn.disabled = false; }
  }
}

async function fbPull() {
  if (!window._fbUser) return;
  if (!window._fb) { toast('Firebase não inicializado.', '#DC2626'); return; }

  // Confirmação visual dentro do modal
  const btn = document.querySelector('#fb-modal-overlay button[onclick="fbPull()"]');
  if (btn && !btn.dataset.confirming) {
    btn.dataset.confirming = '1';
    btn.textContent = '⚠️ Confirmar? Dados locais serão substituídos!';
    btn.style.background = '#D97706';
    btn.style.color = '#fff';
    btn.style.border = 'none';
    setTimeout(() => {
      if (btn) {
        btn.dataset.confirming = '';
        btn.textContent = '⬇️ Carregar nuvem';
        btn.style.background = '';
        btn.style.color = '#2563EB';
        btn.style.border = '1px solid #BFDBFE';
      }
    }, 4000);
    return;
  }

  if (btn) { btn.textContent = '⏳ Baixando...'; btn.disabled = true; }
  try {
    const data = await window._fb.load(window._fbUser.uid);
    if (!data) { toast('Nenhum dado encontrado na nuvem.', '#D97706', 4000); if(btn){btn.textContent='⬇️ Carregar nuvem';btn.disabled=false;btn.dataset.confirming='';} return; }

    // Aplica os dados na memória
    DB_FIELDS.forEach(k => { if (data[k] !== undefined) A[k] = data[k]; });

    // Tenta abrir seletor de local de salvamento (File System Access API)
    const suggestedName = 'financas_' + new Date().toISOString().slice(0,10) + '.json';
    if (window.showSaveFilePicker) {
      try {
        const fileHandle = await window.showSaveFilePicker({
          suggestedName,
          types: [{ description: 'Arquivo de dados PFP', accept: { 'application/json': ['.json'] } }]
        });
        // Vincula como arquivo principal e salva
        _diskFileHandle = fileHandle;
        await _idbSet('diskFileHandle', fileHandle);
        _storageMode = 'disk';
        localStorage.setItem(FS_HANDLE_KEY, 'disk');
        await dbSave();
        document.getElementById('fb-modal-overlay')?.remove();
        render();
        toast('⬇️ Dados salvos em: ' + (fileHandle.name || suggestedName), '#2563EB', 5000);
        _updateDbStatus();
        return;
      } catch(e2) {
        if (e2.name === 'AbortError') {
          // Usuário cancelou o seletor — encerra sem fazer nada
          if (btn) { btn.textContent = '⬇️ Baixar dados da Nuvem → Local'; btn.disabled = false; btn.dataset.confirming = ''; }
          return;
        } else {
          console.warn('fbPull showSaveFilePicker error:', e2);
          // Continua para fallback de download
        }
      }
    }

    // Fallback: gera download via <a> (o browser pergunta o local se configurado para isso)
    try {
      const payload = {};
      DB_FIELDS.forEach(k => { payload[k] = A[k]; });
      payload._savedAt = new Date().toISOString();
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = suggestedName;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
      document.getElementById('fb-modal-overlay')?.remove();
      dbSave();
      render();
      toast('⬇️ Dados baixados: ' + suggestedName, '#2563EB', 4000);
    } catch(e3) {
      console.warn('fbPull download fallback error:', e3);
      // Último recurso: salva apenas no armazenamento interno
      document.getElementById('fb-modal-overlay')?.remove();
      dbSave();
      render();
      toast('⬇️ Dados restaurados da nuvem com sucesso!', '#2563EB', 4000);
    }
  } catch(e) {
    if (btn) { btn.textContent = '⬇️ Baixar dados da Nuvem → Local'; btn.disabled = false; btn.dataset.confirming = ''; }
    console.error('fbPull error:', e);
    toast('Erro ao baixar: ' + (e.message || e.code || 'erro desconhecido'), '#DC2626', 5000);
  }
}

function csvGuessCategory(desc, val) {
  const d = desc || '';
  for (const rule of CSV_CAT_MAP) {
    if (rule.pat.test(d)) {
      if (rule.isTransf) return { catId: null, isTransf: true };
      return { catId: rule.catId, isTransf: false };
    }
  }
  // Fallback: 'Outros' para despesa ou receita
  const defCat = val >= 0
    ? (A.cats.find(c => c.tipo === 'receita' && c.name === 'Outros') || A.cats.find(c => c.tipo === 'receita'))
    : (A.cats.find(c => c.tipo === 'despesa' && c.name === 'Outros') || A.cats.find(c => c.tipo === 'despesa'));
  return { catId: defCat ? defCat.id : null, isTransf: false };
}

// ── Parsers de formatos conhecidos ──
function csvDetectAndParse(text) {
  // Remove BOM UTF-8 se presente
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return { rows: [], format: 'desconhecido' };

  // Itaú conta corrente: tem metadados no topo, depois header "data,lançamento,...,valor (R$),saldos (R$)"
  const itauHeaderIdx = lines.findIndex(l => /data.*lan.*amento.*valor/i.test(l));
  if (itauHeaderIdx >= 0) {
    return { rows: csvParseItau(lines, itauHeaderIdx), format: 'Itaú (conta corrente)' };
  }

  const h = lines[0].toLowerCase();

  // Fatura cartão: "Data;Estabelecimento;Portador;Valor;Parcela"
  if (h.includes('estabelecimento') && h.includes('portador')) {
    return { rows: csvParseFaturaCartao(lines), format: 'Fatura Cartão (Itaú/Bradesco)' };
  }
  // Nubank cartão: "date,category,title,amount"
  if (h.includes('date') && h.includes('category') && h.includes('title') && h.includes('amount')) {
    return { rows: csvParseNubankCartao(lines), format: 'Nubank (cartão)' };
  }
  // Nubank conta: "Data,Descrição,Valor"  (pt-BR, sem category)
  if ((h.includes('data') && h.includes('descri') && h.includes('valor')) && !h.includes('category')) {
    return { rows: csvParseGeneric(lines, { dateCol: 0, descCol: 1, valCol: 2, sep: ',', dateFormat: 'dmy' }), format: 'Nubank (conta)' };
  }
  // Inter: "Data Lançamento;Histórico;Descrição;Valor"
  if (h.includes('hist') && (h.includes(';') || h.includes('lançamento'))) {
    return { rows: csvParseInter(lines), format: 'Banco Inter' };
  }
  // BB/Bradesco/genérico com ponto-e-vírgula
  if (h.includes(';')) {
    return { rows: csvParseSemicolon(lines), format: 'Genérico (;)' };
  }
  // Genérico vírgula
  return { rows: csvParseGeneric(lines, { dateCol: 0, descCol: 1, valCol: 2, sep: ',', dateFormat: 'auto' }), format: 'Genérico (,)' };
}

// Parser fatura de cartão: Data;Estabelecimento;Portador;Valor;Parcela
function csvParseFaturaCartao(lines) {
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = csvSplit(lines[i], ';');
    if (cols.length < 4) continue;
    const date = csvParseDate(cols[0]);
    if (!date) continue;
    const estabelecimento = (cols[1] || '').trim();
    const portador = (cols[2] || '').trim();
    const parcela = (cols[4] || '').trim();
    // Monta descrição com parcela se houver
    const parcelaInfo = (parcela && parcela !== '-' && parcela !== '') ? ` (${parcela})` : '';
    const desc = estabelecimento + parcelaInfo;
    // Valor: "R$ 1.234,56" ou "R$ -1.234,56"
    const val = csvParseVal(cols[3]);
    if (val === null || !desc) continue;
    // Ignora pagamentos de fatura (valores negativos = crédito/pagamento)
    if (val < 0) continue;
    const row = { date, desc, val: -val }; // cartão = despesa (negativo)
    if (portador) row.familia = portador;
    rows.push(row);
  }
  return rows;
}

// Parser Itaú conta corrente
// Header: data,lançamento,ag./origem,valor (R$),saldos (R$)
// Linhas de saldo/anterior devem ser ignoradas
const ITAU_SKIP = /saldo\s*(total|anterior|disponível|dia)|^,+$|lançamentos/i;
function csvParseItau(lines, headerIdx) {
  const rows = [];
  // Detecta separador do header
  const headerLine = lines[headerIdx];
  const sep = headerLine.includes(';') ? ';' : ',';
  const header = csvSplit(headerLine.toLowerCase(), sep);
  const dateCol  = header.findIndex(h => /^data/.test(h.trim()));
  const descCol  = header.findIndex(h => /lan.*amento|descri|histórico|hist/.test(h.trim()));
  const valCol   = header.findIndex(h => /valor/.test(h.trim()));

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim() || ITAU_SKIP.test(line)) continue;
    const cols = csvSplit(line, sep);
    const date = csvParseDate(cols[dateCol >= 0 ? dateCol : 0]);
    const desc = (cols[descCol >= 0 ? descCol : 1] || '').trim();
    // Valor: coluna específica; ignora coluna de saldo
    let rawVal = (cols[valCol >= 0 ? valCol : 3] || '').trim();
    // Itaú às vezes tem valor na col 3 e saldo na col 4; ignora se rawVal vazio
    if (!rawVal) continue;
    const val = csvParseVal(rawVal);
    if (!date || val === null || val === 0 || !desc) continue;
    rows.push({ date, desc, val });
  }
  return rows;
}

function csvSplit(line, sep) {
  // Respeita aspas
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === sep && !inQ) { result.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function csvParseDate(str) {
  if (!str) return null;
  str = str.trim();
  // yyyy-mm-dd
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0, 10);
  // dd/mm/yyyy or dd/mm/yy
  const dm = str.match(/^(\d{2})\/(\d{2})\/(\d{2,4})/);
  if (dm) {
    let y = dm[3]; if (y.length === 2) y = '20' + y;
    return `${y}-${dm[2]}-${dm[1]}`;
  }
  // mm/dd/yyyy (americano)
  const md = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (md) return `${md[3]}-${md[1].padStart(2,'0')}-${md[2].padStart(2,'0')}`;
  return null;
}

function csvParseVal(str) {
  if (!str && str !== 0) return null;
  // Remove R$, espaços, aspas
  str = String(str).replace(/R\$|\s|"/g, '').trim();
  if (!str) return null;
  // Formato BR: 1.234,56 → 1234.56
  if (/\d\.\d{3},/.test(str) || /,\d{2}$/.test(str)) {
    str = str.replace(/\./g, '').replace(',', '.');
  } else {
    // Remove separador de milhar americano se houver
    str = str.replace(/,(?=\d{3})/g, '');
  }
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}

function csvParseNubankCartao(lines) {
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = csvSplit(lines[i], ',');
    if (cols.length < 4) continue;
    const date = csvParseDate(cols[0]);
    const desc = (cols[2] || cols[1] || '').trim();
    const val = csvParseVal(cols[3]);
    if (!date || val === null) continue;
    rows.push({ date, desc, val: -Math.abs(val) }); // cartão = sempre despesa
  }
  return rows;
}

function csvParseInter(lines) {
  const rows = [];
  const sep = ';';
  // Detecta colunas pelo header
  const header = csvSplit(lines[0].toLowerCase(), sep);
  const dIdx = header.findIndex(h => h.includes('data'));
  const descIdx = header.findIndex(h => h.includes('descri') || h.includes('hist'));
  const valIdx = header.findIndex(h => h.includes('valor'));
  const tipoIdx = header.findIndex(h => h.includes('tipo') || h.includes('dc') || h.includes('crédito') || h.includes('débito'));
  for (let i = 1; i < lines.length; i++) {
    const cols = csvSplit(lines[i], sep);
    const date = csvParseDate(cols[dIdx]);
    const desc = (cols[descIdx] || '').trim();
    let val = csvParseVal(cols[valIdx]);
    if (!date || val === null) continue;
    // Alguns bancos têm coluna de tipo D/C
    if (tipoIdx >= 0) {
      const tipo = (cols[tipoIdx] || '').trim().toUpperCase();
      if (tipo === 'D' || tipo === 'DEB' || tipo.includes('DÉB')) val = -Math.abs(val);
      else if (tipo === 'C' || tipo === 'CRE' || tipo.includes('CRÉ')) val = Math.abs(val);
    }
    rows.push({ date, desc, val });
  }
  return rows;
}

function csvParseSemicolon(lines) {
  return csvParseGeneric(lines, { dateCol: 0, descCol: 1, valCol: 2, sep: ';', dateFormat: 'auto' });
}

function csvParseGeneric(lines, { dateCol, descCol, valCol, sep, dateFormat }) {
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = csvSplit(lines[i], sep);
    const date = csvParseDate(cols[dateCol]);
    const desc = (cols[descCol] || '').trim();
    const val = csvParseVal(cols[valCol]);
    if (!date || val === null || !desc) continue;
    rows.push({ date, desc, val });
  }
  return rows;
}

function _csvHandleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const isExcel = ext === 'xls' || ext === 'xlsx';

  function processText(text) {
    const { rows, format } = csvDetectAndParse(text);
    if (!rows.length) {
      toast('Nenhum lançamento encontrado no arquivo. Verifique o formato.', '#DC2626', 5000);
      return;
    }
    const existingHashes = new Set(
      A.txs.flatMap(t => [
        t.date + '|' + (t.obs||t.desc||'') + '|' + (t.type==='despesa'?-t.val:t.val),
        t.date + '|' + (t.desc||'') + '|' + (t.type==='despesa'?-t.val:t.val),
      ])
    );
    function rowHash(r) { return r.date + '|' + r.desc + '|' + r.val; }
    const selected = new Set();
    rows.forEach((r, i) => {
      const guess = csvGuessCategory(r.desc, r.val);
      r.catId = guess.catId;
      r.isTransf = guess.isTransf;
      if (!existingHashes.has(rowHash(r))) selected.add(i);
    });
    _csvState.rows = rows;
    _csvState.format = format;
    _csvState.selected = selected;
    _csvState.fileName = file.name;
    _csvState.step = 'preview';
    _renderCsvModal();
  }

  if (isExcel) {
    // Usa SheetJS para converter XLS/XLSX → CSV
    if (typeof XLSX === 'undefined') {
      toast('Biblioteca de leitura de Excel ainda carregando. Aguarde um instante e tente novamente.', '#D97706', 4000);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {
          type: 'array',
          cellDates: true,   // converte seriais de data em objetos Date
          cellText: false,
          raw: false,
        });
        // Usa a primeira aba
        const ws = wb.Sheets[wb.SheetNames[0]];
        // Converte para CSV com datas em formato dd/mm/yyyy (padrão BR)
        const csv = XLSX.utils.sheet_to_csv(ws, { dateNF: 'DD/MM/YYYY', blankrows: false });
        processText(csv);
      } catch(err) {
        toast('Erro ao ler arquivo Excel: ' + err.message, '#DC2626', 5000);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    // CSV normal
    const reader = new FileReader();
    reader.onload = e => processText(e.target.result);
    reader.readAsText(file, 'UTF-8');
  }
}

function buildCsvCatPicker(rowIdx, selId, tipo) {
  const pid = 'csvcat' + rowIdx;
  if (!A.ctpExp) A.ctpExp = {};
  if (!A.ctpExp[pid]) A.ctpExp[pid] = {};
  const exp = A.ctpExp[pid];
  const tipos = tipo ? [tipo] : ['despesa', 'receita', 'transferencia'];
  const selCat = A.cats.find(c => c.id === selId) || null;
  const selColor = selCat ? (selCat.color || '#94A3B8') : '#94A3B8';
  const selName = selCat ? selCat.name : 'Sem categoria';
  const selTipo = selCat ? selCat.tipo : '';
  const tc = selTipo === 'despesa' ? 'desp' : selTipo === 'receita' ? 'rec' : selTipo === 'transferencia' ? 'tr' : '';
  let items = '';
  tipos.forEach(t => {
    const roots = A.cats.filter(c => c.tipo === t && !c.parentId);
    roots.forEach(root => {
      const rid = root.id;
      const subs = A.cats.filter(c => c.parentId === rid);
      const hasSub = subs.length > 0;
      const rootSel = selId === rid;
      const rtc = t === 'despesa' ? 'desp' : t === 'receita' ? 'rec' : 'tr';
      const expanded = exp[rid] === true;
      const tog = hasSub
        ? `<div class="ctp-toggle" onclick="event.stopPropagation();A.ctpExp['${pid}'][${rid}]=A.ctpExp['${pid}'][${rid}]===true?false:true;_ctpRender('${pid}')">${expanded ? '▼' : '▶'}</div>`
        : `<div class="ctp-toggle"></div>`;
      items += `<div class="ctp-item ctp-root ${rtc} ${rootSel ? 'selected' : ''}" data-catid="${rid}" onclick="_csvPickCat(${rowIdx},${rid})">${tog}<div class="ctp-idot" style="background:${root.color}"></div><div class="ctp-iname">${H(root.name)}</div></div>`;
      if (hasSub) {
        items += `<div class="ctp-children ${expanded ? 'open' : ''}" id="ctpc-${pid}-${rid}">`;
        subs.forEach(sub => {
          const subSel = selId === sub.id;
          items += `<div class="ctp-item ctp-sub ${rtc} ${subSel ? 'selected' : ''}" data-catid="${sub.id}" onclick="_csvPickCat(${rowIdx},${sub.id})"><div class="ctp-toggle"></div><div class="ctp-idot" style="background:${sub.color}"></div><div class="ctp-iname">${H(sub.name)}</div></div>`;
        });
        items += `</div>`;
      }
    });
  });
  return `<div class="ctp-wrap" id="ctpw-${pid}" style="position:relative"><button type="button" class="ctp-trigger ${tc}" id="ctpt-${pid}" onclick="_ctpToggle('${pid}')" style="font-size:12px;padding:4px 10px;min-width:160px;max-width:220px"><div class="ctp-dot" style="background:${selColor}"></div><span class="ctp-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${H(selName)}</span><span class="ctp-arrow">▼</span></button><div class="ctp-dropdown" id="ctpd-${pid}" style="min-width:220px;max-height:260px;overflow-y:auto">${items}</div></div>`;
}

function _csvConfirmImport() {
  const { rows, selected, accId } = _csvState;
  let count = 0;
  const famDefault = A.familia[0]?.name || '';

  selected.forEach(i => {
    const r = rows[i];
    const type = r.val >= 0 ? 'receita' : 'despesa';
    const catId = r.catId || (A.cats.find(c => c.tipo === type && c.name === 'Outros') || A.cats.find(c => c.tipo === type))?.id || null;
    // Usa família do parser (ex: Portador da fatura) ou o padrão
    let familia = famDefault;
    if (r.familia) {
      // Tenta encontrar membro da família pelo nome (match parcial case-insensitive)
      const famMatch = famNames().find(n => r.familia.toLowerCase().includes(n.toLowerCase()) || n.toLowerCase().includes(r.familia.split(' ')[0].toLowerCase()));
      familia = famMatch || r.familia;
    }
    A.txs.push({
      id: A.nid++,
      type,
      desc: r.desc,
      val: Math.abs(r.val),
      date: r.date,
      catId,
      accId,
      accDest: null,
      recur: 'none',
      obs: '',
      planned: false,
      done: true,
      familia,
    });
    count++;
  });

  closeCsvImport();
  render();
  toast(`✅ ${count} lançamento${count!==1?'s':''} importado${count!==1?'s':''}!`, '#059669', 4000);
}

function filterSenhas(val){
  A.senhaSearch=val;
  const q=val.toLowerCase().trim();
  const cards=document.querySelectorAll('.senha-card[data-search-key]');
  let visible=0;
  cards.forEach(card=>{
    const key=card.getAttribute('data-search-key')||'';
    const show=!q||key.includes(q);
    card.style.display=show?'':'none';
    if(show)visible++;
  });
  const total=cards.length;
  const countEl=document.getElementById('senha-count');
  if(countEl)countEl.textContent=q?(visible+' de '+total+' registro'+(total!==1?'s':'')):(total+' registro'+(total!==1?'s':''));
  const noRes=document.getElementById('senha-no-result');
  if(noRes)noRes.style.display=(total>0&&visible===0)?'block':'none';
  const clearBtn=document.getElementById('senha-search-clear');
  if(clearBtn)clearBtn.style.display=val?'block':'none';
}
